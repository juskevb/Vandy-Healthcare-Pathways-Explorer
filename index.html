window.EXPLORER_TRACKS = window.EXPLORER_TRACKS || [];
window.EXPLORER_TRACKS.push({
 id: "data-analytics-technology",
 name: "Data, Analytics & Technology",
 short: "Every visit, prescription, and payment leaves a data trail. The people who can read it decide where billions in care go next - and they're chronically scarce.",
 color: "#7d5b8e",
 wash: "#efe8f2",
 glyph: "grid",
 entryTitle: "Entry role: Data Analyst",
 tagline: "Healthcare generates more data than almost any industry and understands it worse. Analysts and technologists turn claims, medical records, and lab feeds into the answers that run the system: who's getting sicker, what's working, where money leaks. If you like finding patterns and explaining them to humans, this is the highest-leverage seat in the building.",
 stats: [
 { k: "Entry job titles", v: "Data Analyst, Analytics Consultant" },
 { k: "The one skill", v: "SQL - cited in nearly every posting" },
 { k: "Field outlook", v: "~21-23% growth for analyst roles (BLS)" },
 { k: "Vanderbilt advantage", v: "A top biomedical informatics department" }
 ],
 field: {
 what: [
 "When a health plan wants to know which members will end up in the hospital next quarter, when a hospital wants to know why Tuesdays overwhelm the infusion center, when a pharma company wants to know how a drug performs outside its trial - a data analyst answers, usually by querying enormous databases of <b>claims</b> (the bills insurers pay) and <b>EHR data</b> (the clinical record). The raw material is messy, coded, and vast; the job is turning it into a decision.",
 "The day-to-day: write SQL against the data warehouse, clean and shape the result in Python or R, build the Tableau or Power BI dashboard, then - the part that determines your career ceiling - <b>explain it</b> to clinicians and executives who will never read a query. Employers say the scarce combination isn't technical skill or healthcare knowledge; it's both in one person who can also communicate.",
 "The technology side widens the lane beyond analysis: implementation and technical-solutions roles at EHR vendors (Epic, Oracle Health), product and data roles at health-tech companies (Flatiron, Komodo, Tempus, athenahealth), and increasingly ML/AI work on risk prediction and clinical text. You don't need a CS degree for most of it - Epic famously hires strong liberal-arts graduates and trains them - but SQL fluency is the near-universal ticket in."
 ],
 misconception: "That you need to be a software engineer. Most healthcare analytics roles want SQL + Excel + one visualization tool + healthcare vocabulary - a stack you can genuinely build in two semesters of deliberate practice. The rarer skill (and the one interviews probe) is judgment: knowing what the data can't tell you, and saying so.",
 titles: [
 { title: "Healthcare Data Analyst", desc: "At a plan, system, or vendor: SQL, dashboards, and analyses that answer operational and clinical questions. The standard entry door." },
 { title: "Analytics / Decision Science Consultant (Optum, IQVIA, ZS)", desc: "Client-facing analytics - pharma commercial data, payer analytics, real-world evidence. Consulting pace, data depth." },
 { title: "Implementation / Technical Solutions (Epic, Oracle Health)", desc: "Configure and troubleshoot the systems hospitals run on. Hires all majors; trains intensely; great industry education." },
 { title: "Product / Data roles at health-tech startups", desc: "Flatiron, Komodo, Tempus, and Nashville's own health-tech cluster - smaller teams, broader ownership, faster feedback." }
 ],
 day: [
 { time: "9:00a", what: "Standup with the care-management team: they want last month's readmission numbers cut by region." },
 { time: "9:30a", what: "Write the SQL; discover 4% of discharge dates are null and chase down why before trusting anything." },
 { time: "11:30a", what: "Pair with a clinical pharmacist to sanity-check your medication-adherence logic against reality." },
 { time: "1:00p", what: "Rebuild the readmissions dashboard; delete two charts nobody used and add the one they kept asking for." },
 { time: "2:30p", what: "Present findings to the VP: three slides, one recommendation, zero SQL on screen." },
 { time: "4:00p", what: "Document the query and push it to the team repo; future-you says thanks." },
 { time: "5:30p", what: "Skim a health-tech newsletter; the tools change fast and the curious get promoted." }
 ],
 employers: {
 nashville: ["HCA Healthcare ITG", "BlueCross BlueShield of Tennessee", "Embold Health", "XSolis", "Medalogix", "Lirio", "HealthStream", "Cedar Gate Technologies", "VUMC (analytics & informatics)"],
 national: ["Optum / UnitedHealth", "IQVIA", "Komodo Health", "Flatiron Health", "Tempus", "Epic Systems", "Oracle Health", "athenahealth", "Arcadia", "Datavant", "Truveta", "Innovaccer", "Milliman", "ZS Associates", "Clarify Health"]
 },
 thrive: [
 "Finding the pattern in a messy dataset feels like a puzzle you'd do for free",
 "You're the one who makes the group project's spreadsheet actually work",
 "You like proof - “I think” bothers you when “the data shows” is available",
 "Explaining a technical thing simply gives you satisfaction, not annoyance",
 "You want a skill set that transfers anywhere in healthcare (it does - every track in this explorer needs analysts)"
 ]
 },
 project: {
 title: "Find the readmission leak at Bellhaven Health Plan",
 role: "Analytics intern, Bellhaven Health Plan (a fictional regional insurer, ~400,000 members)",
 setting: "4-week sprint for the VP of Medical Management",
 duration: "≈ 2 hours",
 premise: [
 "Hospital <b>readmissions</b> - a patient discharged, then back in a hospital bed within 30 days - are healthcare's signature failure metric: bad for the patient, expensive for the plan, and often preventable. Bellhaven's readmission spending is up 11% year over year, and the VP of Medical Management wants to know <b>where it's concentrated and what to do about it</b>.",
 "You're the intern on the analytics team. You'll do the real sequence: learn to read claims data, write the query that defines the metric, find the actionable pattern in the results, and brief an executive who has eight minutes and no patience for jargon."
 ],
 fictionNote: "Bellhaven is fictional; the data is simplified. But 30-day readmissions is a real, canonical analytics assignment - CMS penalizes hospitals for excess readmissions, every plan tracks them, and versions of these exact tasks run daily at Optum, BCBS plans, and health-system analytics teams.",
 tasks: [
 {
 title: "Learn to read claims: find the readmissions by hand",
 minutes: 25,
 skills: ["Claims data literacy", "ICD-10 basics", "Careful definition"],
 brief: "<p>Claims data is the plan's ledger of care: every hospital stay becomes a row with a member ID, dates, diagnosis codes (<b>ICD-10</b> - e.g., <code>I50.9</code> is heart failure), and the amount paid. Before anyone writes code, an analyst must be able to apply the metric definition <i>by hand</i> - because if the definition is fuzzy, the query will be confidently wrong.</p><p><b>Definition you're given:</b> a readmission is any inpatient admission occurring within 30 days of a <i>prior discharge</i> for the <i>same member</i>, for any cause.</p>",
 data: "<div class=\"data-block\"><table class=\"d\"><caption>Inpatient admissions extract (one quarter, three members)</caption><thead><tr><th>Member</th><th>Admit</th><th>Discharge</th><th>Primary dx</th><th>Meaning</th><th class=\"num\">Paid</th></tr></thead><tbody><tr><td>M-1041</td><td>Mar 2</td><td>Mar 6</td><td>I50.9</td><td>Heart failure</td><td class=\"num\">$14,200</td></tr><tr><td>M-1041</td><td>Mar 21</td><td>Mar 24</td><td>I50.9</td><td>Heart failure</td><td class=\"num\">$11,800</td></tr><tr><td>M-1041</td><td>Jun 10</td><td>Jun 13</td><td>I50.9</td><td>Heart failure</td><td class=\"num\">$12,400</td></tr><tr><td>M-2203</td><td>Apr 11</td><td>Apr 12</td><td>N39.0</td><td>Urinary tract infection</td><td class=\"num\">$6,100</td></tr><tr><td>M-2203</td><td>May 20</td><td>May 22</td><td>N39.0</td><td>Urinary tract infection</td><td class=\"num\">$7,300</td></tr><tr><td>M-3178</td><td>May 1</td><td>May 3</td><td>J18.9</td><td>Pneumonia</td><td class=\"num\">$9,800</td></tr><tr><td>M-3178</td><td>May 28</td><td>May 30</td><td>J44.1</td><td>COPD exacerbation</td><td class=\"num\">$10,600</td></tr></tbody></table></div>",
 todo: "<ol><li>Apply the definition row by row: which admissions count as readmissions? (Careful: the clock runs from the prior <b>discharge</b> date, not the admit date.)</li><li>One member has two admissions for the same condition that are <i>not</i> a readmission - which, and why?</li><li>The definition says “any cause.” One pair of admissions has different diagnoses - does it count? Why might the plan define it that way?</li></ol>",
 model: "<p><b>The readmissions:</b> M-1041's Mar 21 admission (15 days after the Mar 6 discharge) and M-3178's May 28 admission (25 days after the May 3 discharge). Two readmissions in the extract.</p><p><b>The non-readmission pair:</b> M-2203 - May 20 is 38 days after the Apr 12 discharge. Outside the window, so it's a new admission, even though it's the same diagnosis. (M-1041's Jun 10 stay is likewise ~78 days out - chronic illness, recurring admissions, but not “readmissions” by this metric.)</p><p><b>The any-cause pair:</b> M-3178 went in for pneumonia and returned with a COPD exacerbation - different codes, still counts. Plans use all-cause definitions because post-discharge deterioration often presents as a related-but-different diagnosis, and because condition-specific definitions invite gaming. Real production logic adds exclusions you'd learn on the job (planned readmissions like scheduled chemo, same-day transfers between facilities) - noticing that the simple definition has edge cases is exactly the instinct analytics managers hire for.</p>"
 },
 {
 title: "Write the SQL that computes it at scale",
 minutes: 30,
 skills: ["SQL", "Self-joins", "Metric implementation"],
 brief: "<p>Seven rows by hand; four million by query. Your team's warehouse has this table:</p><pre class=\"code\">admissions(\n member_id varchar,\n admit_dt date,\n discharge_dt date,\n dx_group varchar, -- e.g. 'Heart failure', 'COPD'\n discharge_disp varchar, -- 'Home', 'Home + home health', 'Skilled nursing'\n paid_amt numeric\n)</pre><p>The classic technique: <b>join the table to itself</b> - pair every admission with any <i>later</i> admission for the same member, then keep the pairs where the gap is ≤ 30 days. Try writing it before peeking; “close but in pseudocode” is a completely successful outcome for this task.</p>",
 todo: "<ol><li>Write a query (or careful pseudocode) that counts 30-day readmissions <b>by dx_group of the original admission</b>.</li><li>State in one sentence what could go wrong if the same discharge has <i>two</i> later admissions within 30 days - does your query count one readmission or two?</li></ol>",
 model: "<pre class=\"code\">SELECT a.dx_group,\n COUNT(DISTINCT a.member_id || a.discharge_dt) AS discharges_w_readmit,\n COUNT(*) AS readmit_events\nFROM admissions a\nJOIN admissions r\n ON r.member_id = a.member_id\n AND r.admit_dt > a.discharge_dt\n AND r.admit_dt <= a.discharge_dt + INTERVAL '30 days'\nGROUP BY a.dx_group\nORDER BY discharges_w_readmit DESC;</pre><p><b>How it works:</b> the join pairs each admission <code>a</code> with every later admission <code>r</code> for the same member inside the window. Grouping by the <i>original</i> admission's diagnosis attributes the readmission to the condition the member was first treated for - which is what the VP wants to target.</p><p><b>The double-count trap:</b> if one discharge is followed by two admissions in 30 days, the raw join yields two rows. Whether that's right depends on the question - “readmission <i>events</i>” counts both; “discharges followed by ≥1 readmission” (the standard rate's numerator) needs the <code>DISTINCT</code>. The habit of asking <i>“one per discharge or one per event?”</i> before running anything is worth more than syntax - definitions, not code, are where healthcare analytics goes wrong.</p>"
 },
 {
 title: "Find the actionable pattern - and the trap in it",
 minutes: 30,
 skills: ["Segmentation", "Opportunity sizing", "Correlation vs. causation"],
 brief: "<p>Your query runs. Segmented by condition and by <b>discharge disposition</b> (where the patient went after the hospital), the year's results:</p>",
 data: "<div class=\"data-block\"><table class=\"d\"><caption>30-day readmission rate by condition × discharge disposition (12 months)</caption><thead><tr><th>Condition</th><th class=\"num\">Discharges</th><th class=\"num\">Home, no services</th><th class=\"num\">Home + home health</th><th class=\"num\">Skilled nursing</th></tr></thead><tbody><tr><td>Heart failure</td><td class=\"num\">2,400</td><td class=\"num\">28%</td><td class=\"num\">14%</td><td class=\"num\">22%</td></tr><tr><td>COPD</td><td class=\"num\">1,800</td><td class=\"num\">22%</td><td class=\"num\">15%</td><td class=\"num\">20%</td></tr><tr><td>Pneumonia</td><td class=\"num\">2,100</td><td class=\"num\">15%</td><td class=\"num\">11%</td><td class=\"num\">18%</td></tr><tr><td>Joint replacement</td><td class=\"num\">1,500</td><td class=\"num\">6%</td><td class=\"num\">5%</td><td class=\"num\">9%</td></tr></tbody></table></div><p>Context: 55% of heart-failure discharges go home with no services (≈1,320/yr). A heart-failure readmission costs the plan ≈ <b>$16,000</b>. The clinical team proposes a <b>transitional-care program</b> - discharge follow-up calls plus a guaranteed cardiology visit within 7 days - costing ≈ <b>$250 per enrolled member</b>, with published evidence of cutting readmissions ~20% (relative).</p>",
 todo: "<ol><li>Name the hotspot - the single segment where the problem concentrates.</li><li>Size the opportunity: if the $250 program enrolled all 1,320 heart-failure/home/no-services members and cut their readmissions 20%, what's the annual net savings?</li><li>Now the trap: the table seems to show home health <i>causes</i> lower readmissions (14% vs 28%). Why is that conclusion not safe - and what would you propose to test it?</li></ol>",
 model: "<p><b>1 - The hotspot:</b> heart failure discharged home without services: the worst rate (28%) on the biggest base (1,320 discharges/yr) ≈ 370 readmissions - more than any other cell in the table.</p><p><b>2 - The math:</b> 20% relative reduction on 370 ≈ <b>74 avoided readmissions</b> × $16,000 ≈ <b>$1.18M saved</b>, against 1,320 × $250 = <b>$330K program cost</b> → net ≈ <b>$850K/year</b>, roughly a 3.6× return - before counting the human value of 74 people not returning to a hospital bed.</p><p><b>3 - The trap:</b> discharge disposition isn't random. Clinicians <i>choose</i> who gets home health - sicker patients may get it (biasing its rate up) or better-supported patients may accept it (biasing it down). The 28%-vs-14% gap mixes the service's effect with the selection. So don't claim causation; propose a <b>pilot</b>: enroll a randomized (or carefully matched) subset of the hotspot group in the transitional-care program and compare readmission rates against the rest. Analysts who volunteer the caveat <i>and</i> the test design are the ones executives learn to trust - this single distinction separates junior from senior analytics work.</p>"
 },
 {
 title: "Brief the executive: eight minutes, no jargon",
 minutes: 30,
 skills: ["Data storytelling", "Dashboard design", "Executive communication"],
 brief: "<p>The VP of Medical Management wants two things: a <b>five-sentence summary</b> she can forward to the chief medical officer, and a one-screen <b>dashboard sketch</b> her team will check monthly. Constraint from her assistant: <i>“If it contains the words ‘self-join’ or ‘disposition segmentation,’ she will stop reading.”</i></p>",
 todo: "<ol><li>Write the five sentences: the finding, the size of the problem, the recommended action, the expected return, and the honest caveat. Numbers in every sentence you can manage.</li><li>Sketch (boxes on paper are fine) a one-screen dashboard: what single number goes top-left? What trend? What breakdown? What would you deliberately leave out?</li></ol>",
 model: "<p><b>The five sentences:</b> “Our 30-day readmission problem is concentrated in one place: heart-failure patients sent home without follow-up support, who return to the hospital 28% of the time - about 370 readmissions and $5.9M in spend last year. Patients with home-based follow-up are readmitted at half that rate, though some of that gap reflects which patients get chosen for support rather than the support itself. We recommend piloting a transitional-care program - a follow-up call plus a cardiology visit within 7 days - for this group, at roughly $250 per member. If it delivers the ~20% reduction published elsewhere, that's about 74 avoided hospitalizations and $850K in net savings annually. A randomized pilot this quarter would confirm the effect before we scale it plan-wide.”</p><p><b>The dashboard:</b> top-left, the single owned number - <i>heart-failure 30-day readmission rate, this month vs. last year</i> - big. Beside it: readmissions and dollars, year to date. Center: 13-month trend line with the pilot start date marked. Bottom: rate by condition (the table you built, as a bar chart), and pilot vs. non-pilot group tracking once it launches. <b>Deliberately excluded:</b> member-level lists (wrong audience), more than ~5 numbers (dashboards die of clutter), and anything the VP can't influence. A dashboard is an argument about what matters - that's why designing one is an analyst's job and not a formatting chore.</p>"
 }
 ]
 },
 next: {
 courses: [
 "<b>SQL + statistics first</b> - any path: DSI courses, CS 1100-level, or free (freeCodeCamp SQL, Khan Academy stats)",
 "<b>Department of Biomedical Informatics (DBMI)</b> - one of the largest in the country; look at BIDS (Big Biomedical Data Science) offerings",
 "<b>Biostatistics courses</b> - the methods behind every clinical analysis",
 "MHS 2140 for the healthcare vocabulary that separates you from generic data candidates"
 ],

 "<b>Vanderbilt Bioinformatics and Technology Club (VBIT)</b>",
 "<b>VandyHacks</b> - build one health-data project at a hackathon; it becomes your interview story",
 "<b>The Wond'ry</b> innovation programs - health-tech project experience",
 "Data Science Institute workshops - free, open across schools"
 ],
 experiences: [
 "Internships to target: <b>Optum/UnitedHealth</b>, <b>CVS InnoTech</b>, <b>Flatiron Health</b>, <b>Komodo Health</b>, <b>Tempus</b>, <b>Epic (SWE/PM/TS)</b>, <b>Oracle Health</b>, <b>BCBS of Tennessee</b>",
 "Nashville health-tech: <b>HCA ITG</b> data/IT analyst roles, <b>Embold Health</b>, <b>XSolis</b>, <b>Medalogix</b>",
 "<b>Google Data Analytics Certificate</b> + <b>Tableau Desktop Specialist</b> - the two highest-ROI credentials for this track",
 "Kaggle healthcare datasets & DrivenData competitions - portfolio projects that show real skill"
 ],
 now: [
 "Build a dashboard from public CMS or CDC data - a small project you can show and talk through in interviews",
 "Do 20 SQL exercises this week - sqlbolt.com or equivalent; the interview screen is usually a live query",
 "Learn to read a claims row: ICD-10, CPT, NDC - one evening with CMS.gov covers the basics"
 ]
 }
});

<script>

window.EXPLORER_TRACKS.push({
 id: "research-scientific-affairs",
 name: "Research & Scientific Affairs",
 short: "Between the lab bench and the pharmacy shelf sits a decade of trials, filings, and evidence-making. Thousands of non-clinical careers live in that gap.",
 color: "#3e7d78",
 wash: "#e4efee",
 glyph: "flask",
 entryTitle: "Entry role: Clinical Research Coordinator",
 tagline: "Getting a treatment from a promising molecule to an approved, covered, correctly-used medicine takes armies of people who aren't physicians or bench scientists: trial coordinators, regulatory specialists, health economists, medical writers, and scientific strategists. If you love the science but not the stethoscope - this is your wing of the industry.",
 stats: [
 { k: "Entry job titles", v: "Clinical Research Coordinator, Regulatory Associate" },
 { k: "The core skill", v: "Reading evidence critically - and translating it" },
 { k: "Signature deliverable", v: "The evidence story behind a medicine" },
 { k: "Nashville advantage", v: "Sarah Cannon runs trials at global scale here" }
 ],
 field: {
 what: [
 "A drug that works in a lab is roughly a decade and a billion dollars away from a patient. That distance is crossed by <b>clinical trials</b> (designed, run, and monitored by research teams), <b>regulatory filings</b> (thousands of pages arguing safety and efficacy to the FDA), and - increasingly decisive - <b>evidence for payers</b>: proof that the medicine is worth covering at its price. Every step is a career, and almost none of them require an MD or a PhD to start.",
 "Entry doors: a <b>Clinical Research Coordinator</b> runs trial operations at a site like VUMC or Sarah Cannon - recruiting patients, managing protocols and data. A <b>CRA</b> at a contract research organization (IQVIA, Medpace, PPD, ICON) monitors trial sites for quality. <b>Regulatory affairs</b> associates shepherd submissions. <b>HEOR</b> (health economics & outcomes research) analysts build the models that convince insurers. <b>Medical writers</b> turn data into manuscripts and regulatory documents. Two or three years in any of these, and the industry opens wide - including medical science liaison and medical affairs strategy roles for those who add an advanced degree later.",
 "The temperament this track rewards is precision plus translation: you must read a clinical paper skeptically, respect the rules exactly (this is one of the most regulated activities on earth), and explain complex evidence honestly to different audiences - regulators, physicians, payers, patients. People who find that translation act satisfying, rather than tedious, tend to flourish."
 ],
 misconception: "That “working in pharma” means either pipetting in a lab or sales. The industry's largest non-clinical workforce sits between those poles - trial operations, regulatory, medical affairs, HEOR, medical writing - and it's the part that hires strong biology, neuroscience, MHS, and even English majors straight out of undergrad.",
 titles: [
 { title: "Clinical Research Coordinator (CRC)", desc: "Run trials at a site: patient visits, protocol compliance, data capture. VUMC and Sarah Cannon hire continuously; the classic 2-year launchpad." },
 { title: "Clinical Research Associate (CRA) / CTA at a CRO", desc: "Monitor trial sites for IQVIA, Medpace, PPD, ICON - quality, compliance, and travel. Structured new-grad programs exist." },
 { title: "Regulatory Affairs Associate", desc: "Assemble and manage FDA/EMA submissions; learn the rulebook that governs the entire industry." },
 { title: "HEOR / Market Access Analyst", desc: "Model cost-effectiveness and budget impact; build the value dossiers payers demand. Quantitative, strategic, increasingly central." }
 ],
 day: [
 { time: "8:30a", what: "Morning queue: three sites uploaded trial data overnight; two queries need chasing before the sponsor call." },
 { time: "9:30a", what: "Screen two potential trial participants against the protocol's 14 eligibility criteria." },
 { time: "11:00a", what: "Team review of the new heart-failure readout - what can and can't be said before approval." },

 { time: "2:00p", what: "Draft the plain-language study summary the IRB requires for participants." },
 { time: "3:30p", what: "Call with the medical writer on the manuscript's results section - your data tables, her prose." },
 { time: "5:00p", what: "Log site metrics; enrollment is two patients behind plan and the sponsor will ask why." }
 ],
 employers: {
 nashville: ["Sarah Cannon Research Institute", "VUMC (clinical research)", "Vanderbilt-Ingram Cancer Center", "Cumberland Pharmaceuticals", "Aegis Sciences", "PathGroup"],
 national: ["Pfizer", "Eli Lilly", "Merck", "Bristol Myers Squibb", "AstraZeneca", "Genentech / Roche", "Regeneron", "Moderna", "IQVIA", "PPD / Thermo Fisher", "Medpace", "ICON", "Parexel", "Syneos Health", "Trinity Life Sciences", "Lumanity"]
 },
 thrive: [
 "You genuinely enjoy reading studies - methods sections included",
 "Precision feels like craft, not bureaucracy (this industry runs on getting details exactly right)",
 "You want your work connected to real treatments reaching real patients",
 "You like translating: making rigorous science honest <i>and</i> understandable",
 "You're considering grad school later (MPH, MS, PhD, PharmD) and want an on-ramp that keeps every option open"
 ]
 },
 project: {
 title: "Carry a heart-failure drug from trial readout to payer pitch",
 role: "Scientific affairs intern, Solvane Therapeutics (a fictional mid-size biopharma company)",
 setting: "Launch-readiness team, 6 months before an FDA decision",
 duration: "≈ 2 hours",
 premise: [
 "Solvane's lead drug, <b>cardexolol</b>, just completed its Phase 3 trial in chronic heart failure. The readout is positive. Now the company must do four things at once: understand exactly what the evidence shows, stay inside strict pre-approval communication rules, build the economic case insurers will demand, and translate the science honestly for the committees who decide coverage.",
 "As the intern on the scientific affairs team, you'll touch all four - the same arc a real launch team walks, compressed into four tasks."
 ],
 fictionNote: "Solvane, cardexolol, and the MERIDIAN-HF trial are entirely fictional, with simplified numbers. The task sequence - trial interpretation, regulatory guardrails, budget-impact modeling, evidence translation - is the authentic core of medical affairs, HEOR, and market access work at companies like Pfizer, Lilly, and the consultancies that serve them.",
 tasks: [
 {
 title: "Read the trial like a scientist, not a press release",
 minutes: 30,
 skills: ["Clinical trial literacy", "Absolute vs. relative risk", "NNT"],
 brief: "<p>The press release says <i>“cardexolol reduced cardiovascular events by 23%.”</i> Your job is to know what that actually means - because physicians, regulators, and payers will each read it differently, and the difference between <b>relative</b> and <b>absolute</b> risk reduction is the most common way trial results mislead.</p>",
 data: "<div class=\"data-block\"><table class=\"d\"><caption>MERIDIAN-HF: Phase 3, randomized, double-blind, 24-month follow-up</caption><thead><tr><th>Outcome</th><th class=\"num\">Cardexolol (n=2,400)</th><th class=\"num\">Placebo (n=2,400)</th></tr></thead><tbody><tr><td>Primary: CV death or HF hospitalization</td><td class=\"num\">14.2%</td><td class=\"num\">18.5%</td></tr><tr><td>HF hospitalization alone</td><td class=\"num\">9.0%</td><td class=\"num\">12.0%</td></tr><tr><td>Symptomatic hypotension (adverse event)</td><td class=\"num\">6.1%</td><td class=\"num\">3.0%</td></tr><tr><td>Discontinued due to side effects</td><td class=\"num\">4.8%</td><td class=\"num\">3.9%</td></tr></tbody></table></div>",
 todo: "<ol><li>Compute the primary endpoint's <b>relative risk reduction</b> (RRR) and <b>absolute risk reduction</b> (ARR). Confirm where the press release's “23%” came from.</li><li>Compute the <b>number needed to treat</b> (NNT = 1 ÷ ARR): how many patients must take cardexolol for two years to prevent one event?</li><li>Do the same logic for harm: the <b>number needed to harm</b> (NNH) for symptomatic hypotension.</li><li>One sentence: why might a payer be less impressed than the press release wants them to be?</li></ol>",
 model: "<p><b>RRR:</b> (18.5 − 14.2) ÷ 18.5 ≈ <b>23%</b> - that's the headline number. <b>ARR:</b> 18.5% − 14.2% = <b>4.3 percentage points</b>. Same data, much humbler sound.</p><p><b>NNT:</b> 1 ÷ 0.043 ≈ <b>23</b> - treat 23 patients for two years to prevent one death-or-hospitalization. For context, that's a genuinely respectable NNT for a chronic cardiovascular drug.</p><p><b>NNH:</b> hypotension risk rises 6.1% − 3.0% = 3.1 points → 1 ÷ 0.031 ≈ <b>32</b>. So: prevent one major event per 23 patients, cause one significant side effect per 32. Benefit and harm are the same <i>kind</i> of arithmetic - always compute both.</p><p><b>The payer's view:</b> payers buy absolute risk reduction, because they pay for all 23 patients to prevent the one event - so the cost of preventing one event is 23 × 2 years × the drug's price. That single insight is why HEOR exists as a profession, and it sets up Task 3.</p>"
 },
 {
 title: "Learn the rules: what you may say, and when",
 minutes: 25,
 skills: ["Drug development pathway", "Regulatory basics", "Compliance judgment"],
 brief: "<p>A district sales manager emails your team: <i>“These results are incredible - can my reps start sharing the MERIDIAN-HF abstract with cardiologists now?”</i> Cardexolol is <b>not yet approved</b>. Answering requires knowing both the development pathway and one of the industry's brightest legal lines: companies may not promote a drug before approval (or beyond its approved label after).</p>",
 data: "<p>The pathway, scrambled - put it in order first: &nbsp;<i>FDA review of the NDA/BLA · Phase 1 (safety, small group) · Discovery & preclinical (lab and animal) · Phase 3 (large efficacy trials) · Post-market surveillance & Phase 4 · Phase 2 (dose-finding, early efficacy) · NDA/BLA submission</i></p>",
 todo: "<ol><li>Write the seven stages in order, with a phrase on what each is for. Where is cardexolol right now?</li><li>Draft a 3-4 sentence reply to the sales manager: what can't happen, why, and what the <i>compliant</i> path for the science is.</li><li>Name the function whose whole job is walking this line between science and promotion.</li></ol>",
 model: "<p><b>The pathway:</b> Discovery & preclinical → Phase 1 (safety, dozens of subjects) → Phase 2 (dosing and early efficacy, hundreds) → Phase 3 (definitive efficacy vs. comparator, thousands) → <b>NDA/BLA submission</b> (the full evidence dossier) → FDA review (≈10 months standard) → Post-market surveillance/Phase 4 (safety at population scale). Cardexolol sits between submission and decision.</p><p><b>The reply:</b> “No - reps cannot proactively share trial results for an unapproved product; that's pre-approval promotion, which FDA prohibits, and violations carry warning letters, fines, and launch-delaying scrutiny. What <i>is</i> permitted: the science can be presented at medical congresses and published in journals, and if a physician asks us an unsolicited question, Medical Information can respond with the data. Once the label is approved, marketing can promote - within exactly what the label says. Until then, the evidence travels through scientific channels, not sales calls.”</p><p><b>The function:</b> <b>Medical Affairs</b> - scientific experts (MSLs, medical information, publications teams) who engage clinicians on the evidence, firewalled from the commercial organization. The fact that this firewall employs tens of thousands of people tells you how seriously the industry takes the line - and it's a genuine career path for scientifically-minded non-clinicians.</p>"
 },
 {
 title: "Build the payer's budget-impact model",
 minutes: 30,
 skills: ["HEOR", "Budget-impact modeling", "Value framing"],
 brief: "<p>An insurer's pharmacy team will ask one question at launch: <i>“What does covering cardexolol do to our budget?”</i> HEOR analysts answer with a <b>budget-impact model</b> - simple multiplication, chained honestly. The list price will be <b>$6,000/patient/year</b>.</p>",
 data: "<div class=\"data-block\"><table class=\"d\"><caption>Model inputs for a hypothetical 1,000,000-member health plan</caption><thead><tr><th>Input</th><th class=\"num\">Value</th></tr></thead><tbody><tr><td>Members with eligible heart failure</td><td class=\"num\">0.8% = 8,000</td></tr><tr><td>Expected uptake in year 1</td><td class=\"num\">10% = 800 patients</td></tr><tr><td>Drug cost</td><td class=\"num\">$6,000 / patient / yr</td></tr><tr><td>HF hospitalization rate without drug</td><td class=\"num\">12 per 100 patients / yr</td></tr><tr><td>Relative reduction in HF hospitalization (trial)</td><td class=\"num\">25%</td></tr><tr><td>Cost per HF hospitalization</td><td class=\"num\">$18,000</td></tr></tbody></table></div>",
 todo: "<ol><li>Compute year-1 drug spend, hospitalizations avoided, and the offsetting savings.</li><li>Net budget impact, total and <b>per member per month</b> (PMPM) - the unit payers think in.</li><li>The model shows the drug does <i>not</i> pay for itself. Write two honest sentences a market-access team could still say to the payer - without pretending otherwise.</li></ol>",
 model: "<p><b>Drug spend:</b> 800 × $6,000 = <b>$4.8M</b>. <b>Avoided hospitalizations:</b> 800 × 0.12 × 25% = <b>24/year</b>, saving 24 × $18,000 = <b>$432K</b>. <b>Net impact:</b> ≈ <b>$4.37M/year</b>, or $4.37M ÷ 1M members ÷ 12 ≈ <b>$0.36 PMPM</b>.</p><p><b>The honest value story:</b> “Cardexolol adds about 36 cents per member per month in year one, and roughly 10% of its cost is directly offset by avoided hospitalizations. The remaining cost buys measurable health: fewer cardiovascular deaths and hospital stays in a population with few remaining options - value we quantify in the cost-per-outcome analyses accompanying this model.” Most new drugs don't “save money”; they <i>buy health</i>, and the real negotiation is about the price of that health (formally: cost-effectiveness analysis, measured in cost per quality-adjusted life year). Analysts who present the honest number plus the honest frame keep their credibility - and credibility is the entire currency of scientific affairs.</p><p><b>Bonus instinct:</b> notice how sensitive the model is to <i>which</i> 800 patients start therapy - target the highest-risk patients (say, hospitalized in the past year, with double the baseline event rate) and offsets double while drug cost stays flat. “Right patient, right drug” is a financial argument, not just a clinical one.</p>"
 },
 {
 title: "Translate the evidence for the coverage committee",
 minutes: 30,
 skills: ["Medical writing", "Fair balance", "Audience translation"],
 brief: "<p>The payer's <b>P&T committee</b> (pharmacy & therapeutics - the pharmacists and physicians who decide what gets covered) wants a <b>one-paragraph evidence summary</b>, ~150 words, plain language. The rules of good medical writing: absolute numbers alongside relative ones, harms beside benefits, the studied population named precisely, and zero adjectives doing the work numbers should do. “Fair balance” isn't just an FDA rule - it's what keeps expert readers trusting you.</p>",
 todo: "<ol><li>Write the ~150-word summary of MERIDIAN-HF for the committee, using your Task 1 numbers. Include: who was studied, the primary result in relative <i>and</i> absolute terms (with NNT), the main harm, and what remains unknown.</li><li>Then the discipline check: circle every adjective in your draft. Delete any that a number could replace.</li></ol>",
 model: "<p><b>A version that would pass review:</b></p><p><i>“MERIDIAN-HF randomized 4,800 adults with chronic heart failure to cardexolol or placebo, added to standard therapy, for 24 months. The primary composite endpoint - cardiovascular death or heart-failure hospitalization - occurred in 14.2% of cardexolol patients versus 18.5% on placebo: a 23% relative and 4.3-percentage-point absolute reduction, meaning approximately 23 patients treated for two years to prevent one event. Heart-failure hospitalizations alone fell from 12.0% to 9.0%. The principal adverse effect was symptomatic hypotension (6.1% vs. 3.0%; one additional case per 32 patients treated); discontinuation rates were similar between arms. Effects beyond 24 months, and outcomes in patients over 80 or with severe renal impairment - excluded from enrollment - remain uncharacterized.”</i></p><p><b>What makes it professional:</b> the population is specified, every claim carries its number in both relative and absolute form, the harm gets the same arithmetic dignity as the benefit, and the limitations are volunteered rather than extracted. Compare with your draft: the most common miss is omitting what the trial <i>can't</i> show - and that omission is precisely what expert committees are trained to notice.</p>"
 }
 ]
 },

 "Medicaid covers roughly one in five Americans. Medicare sets the prices half the industry lives on. A single coverage rule - who qualifies, for how long, for what services - can change more lives than any clinical innovation of the same year. Health policy careers put you inside those decisions: analyzing what a proposed rule would do, briefing the people who vote on it, or running the programs it creates.",
 "The work happens in four kinds of buildings. <b>Think tanks and research shops</b> (KFF, Brookings, Urban Institute, Mathematica - and in Nashville, the Sycamore Institute) produce the analyses everyone else cites. <b>Government</b> (CMS, CDC, state Medicaid agencies like TennCare, city health departments) writes and runs the programs. <b>Advocacy organizations</b> (like the Tennessee Justice Center) push for specific changes. <b>Consultancies</b> (Avalere, Manatt Health, HMA) translate policy for companies that must navigate it. Entry titles differ; the daily craft is the same: read rigorously, analyze honestly, write clearly, count carefully.",

 project: {
 title: "Should the state extend postpartum Medicaid coverage?",
 role: "Policy intern, the Cumberland Center for Health Policy (a fictional nonpartisan state think tank)",

 "In your state, Medicaid pays for roughly half of all births - but a new mother's coverage ends <b>60 days after delivery</b>, even though a large share of maternal health crises (cardiac complications, hemorrhage-related conditions, severe depression, overdose) occur later in the first year. A state senator has asked your center for a nonpartisan analysis: <b>what would extending postpartum coverage to 12 months cost, and what would it buy?</b>",
 "You'll do the four things a real policy shop does: map the terrain, build the numbers, weigh the options honestly, and write the brief that gets read in the eight minutes between committee hearings."
 ],
 fictionNote: "The Cumberland Center is fictional and the numbers are simplified for teaching - but the policy is real: Tennessee extended TennCare postpartum coverage to 12 months in 2022, and most states have now done the same under a federal option. This case rewinds the clock so you can do the analysis that real analysts (including Nashville's Sycamore Institute) did when it was still an open question.",
 tasks: [
 {
 title: "Map the terrain before you argue anything",
 minutes: 25,
 skills: ["Medicaid mechanics", "Stakeholder mapping", "Policy levers"],
 brief: "<p>Amateurs start with opinions; analysts start with mechanics. Medicaid is <b>jointly funded</b> - the federal government pays a matching share of every state dollar (in most Southern states, roughly 65%) - and states change eligibility through defined channels: state legislation and budget, a <b>state plan amendment</b> (SPA) to the federal government, or a federal waiver. Nothing moves unless a coalition of interested parties lets it move.</p>",
 todo: "<ol><li>List the stakeholders who care about this decision - aim for at least seven - and mark each: likely supporter, likely opponent, or persuadable-with-conditions.</li><li>For your three most important stakeholders, write one sentence on what each actually wants (not their slogan - their interest).</li><li>Note the two mechanical facts from the brief above that will dominate the analysis. </li></ol>",
 model: "<p><b>The map (one version):</b> new mothers and families (supporters; the affected population) · hospitals and OB providers (supporters - uncovered patients become uncompensated care) · the state Medicaid agency (persuadable - cares about administrative workload and budget predictability) · the governor's budget office (persuadable - cares about the state-dollar cost) · fiscal conservatives in the legislature (skeptical - recurring spending) · maternal-health and faith coalitions (supporters - infant and maternal wellbeing crosses party lines) · health plans administering Medicaid (supporters - more covered months) · the hospital association (supporter, and politically potent).</p><p><b>The interests behind the top three:</b> Budget office: “Tell me the <i>state share</i> after federal match, and whether it grows.” Hospitals: “Every uninsured postpartum ER visit is our loss - coverage is revenue.” Skeptical legislators: “Give me a defensible number and a reason this isn't open-ended growth.”</p><p><b>The two dominating facts:</b> the federal match means every state dollar buys ~three dollars of coverage - the state's true cost is ~35% of the sticker price; and the eligible population is bounded (women already enrolled at delivery), which caps the fiscal exposure. Real analysis is knowing which two facts, out of fifty, everything else hangs on.</p>"
 },
 {
 title: "Build the numbers a skeptic can't wave away",
 minutes: 30,
 skills: ["Fiscal estimation", "Assumption chains", "Data honesty"],
 brief: "<p>The senator's staff wants “the number” - annual cost of a 12-month extension. There is no such number lying in a database; you build it from a chain of stated assumptions, each one challengeable, none hidden.</p>",
 data: "<div class=\"data-block\"><table class=\"d\"><caption>What you can pull from public sources (simplified)</caption><thead><tr><th>Input</th><th class=\"num\">Value</th></tr></thead><tbody><tr><td>Births in the state per year</td><td class=\"num\">80,000</td></tr><tr><td>Share covered by Medicaid at delivery</td><td class=\"num\">50%</td></tr><tr><td>Share who would lose coverage at 60 days</td><td class=\"num\">55%</td></tr><tr><td>Of those, share expected to stay enrolled if extended</td><td class=\"num\">60%</td></tr><tr><td>Average Medicaid cost per adult member per month</td><td class=\"num\">$420</td></tr><tr><td>Additional covered months (60 days → 12 months)</td><td class=\"num\">10</td></tr><tr><td>Federal matching rate (FMAP)</td><td class=\"num\">65%</td></tr><tr><td>Share of pregnancy-related deaths occurring 43-365 days postpartum</td><td class=\"num\">~30%</td></tr></tbody></table></div>",
 todo: "<ol><li>Chain it: how many women gain coverage, how many member-months is that, and what's the <b>gross annual cost</b>?</li><li>Split gross cost into <b>federal share</b> and <b>state share</b> - the number the budget office actually debates.</li><li>Write the health-impact sentence: using the mortality-timing fact, what does the current 60-day cutoff mean, stated carefully (no causal overclaim)?</li></ol>",
 hint: "Women affected = 80,000 × 50% × 55%. Not all of them stay enrolled - apply the 60% take-up before multiplying months and dollars.",
 model: "<p><b>The chain:</b> 80,000 births × 50% Medicaid = 40,000 covered deliveries; × 55% losing coverage at day 60 = <b>22,000 women affected</b>; × 60% expected enrollment = 13,200 enrollees × 10 months = <b>132,000 member-months</b> × $420 ≈ <b>$55M gross per year</b>.</p><p><b>The split:</b> federal share 65% ≈ $36M; <b>state share ≈ $19M/year</b>. That's the fight: $19M of recurring state money - real, but small against a multi-billion-dollar Medicaid budget, and it purchases $55M of coverage.</p><p><b>The health sentence:</b> “About 30% of pregnancy-related deaths occur between 43 days and one year postpartum - squarely in the window where 22,000 women a year currently lose coverage; while coverage alone doesn't guarantee prevention, it is the precondition for the follow-up care, mental-health treatment, and chronic-condition management that clinical reviews consistently identify as missed opportunities.” Note the discipline: the mortality-timing fact is stated, the causal claim is <i>not</i> overstated, and every number in the chain is visible for a skeptic to attack. An estimate someone can argue with is credible; an estimate that hides its assumptions is not.</p>"
 },
 {
 title: "Weigh the options like a nonpartisan shop",
 minutes: 30,
 skills: ["Options analysis", "Criteria-based evaluation", "Intellectual honesty"],
 brief: "<p>Nonpartisan analysis rarely says “do X.” It puts 2-4 options against explicit criteria and lets the decision-maker see the trade. Your center's standard criteria: <b>state cost</b>, <b>health impact</b>, <b>administrative feasibility</b>, and <b>political durability</b> (will it survive the next budget cycle?).</p>",
 todo: "<ol><li>Build the options grid: <b>(A)</b> status quo, <b>(B)</b> extend to 6 months, <b>(C)</b> extend to 12 months. Score each against the four criteria in a phrase per cell - no invented precision, honest phrases.</li><li>Add the strongest <i>good-faith argument</i> for each option, including the status quo. (If you can't state the other side's best case, you don't understand the issue yet.)</li><li>One sentence: which option does the evidence favor, and what's the biggest genuine uncertainty in your own analysis?</li></ol>",
 model: "<p><b>The grid, in prose:</b> <b>(A) Status quo</b> - $0 new cost; leaves the 60-day cliff in the highest-risk window; no admin change; durable only until the next maternal-mortality report makes it untenable. Best case for A: recurring dollars are scarce and other maternal-health investments (home visiting, provider access) might buy more health per dollar. <b>(B) 6 months</b> - roughly half the state cost (~$10M); covers some of the risk window but cuts off before late-postpartum mental-health and cardiac risks resolve; <i>worse feasibility than it looks</i> - a nonstandard duration means custom eligibility systems, and the federal option is built for 12 months. Best case for B: a compromise that moves the cliff at lower cost. <b>(C) 12 months</b> - ~$19M state share; covers the full risk window; administratively the <i>simplest</i> extension because federal machinery expects it; most durable - hard to repeal a benefit mothers already use. Best case for C: the full fix at three-to-one federal leverage.</p><p><b>The verdict sentence:</b> “The evidence favors C: option B saves half the money but forfeits both the late-window health impact and the administrative simplicity, making it worse per dollar than it appears - while the biggest genuine uncertainty in our own numbers is the 60% enrollment-retention assumption, which could move the state cost by several million in either direction.” Notice the shape: the recommendation, the honest reason the compromise fails, and a self-disclosed weakness. That last move is what makes a shop citable by both parties - and it's the hardest habit for new analysts to learn.</p>"
 },
 {
 title: "Write the brief that survives the hallway",
 minutes: 35,
 skills: ["Policy writing", "Plain language", "Structure"],
 brief: "<p>Legislators read policy briefs standing in hallways. The form is strict: a title that states the issue, a 3-sentence summary box, then <b>Issue → Background → Analysis → Options → Considerations</b>, one page, plain language, every number sourced. Your center's style rule: <i>a smart reader with no health background should never have to reread a sentence.</i></p>",
 todo: "<ol><li>Write the <b>summary box</b>: three sentences - the problem, the central number, the decision before the legislature.</li><li>Write the <b>Options</b> section from your Task 3 grid - 2-3 lines per option, neutral voice.</li><li>Write the closing <b>Considerations</b> paragraph: implementation timing, the key uncertainty, and what to watch in other states.</li><li>Read the whole thing aloud; rewrite any sentence you stumbled on. (This is a real editing technique used in every policy shop.)</li></ol>",
 model: "<p><b>Summary box:</b> “Medicaid pays for half of the state's 80,000 annual births, but a mother's coverage ends 60 days after delivery - while roughly 30% of pregnancy-related deaths occur between 43 days and one year postpartum. Extending coverage to 12 months would reach about 22,000 women a year at an estimated state cost of $19 million after federal match ($55 million gross). The legislature faces a choice among the status quo, a 6-month extension, and the 12-month extension most states are now adopting.”</p><p><b>Options (excerpt):</b> “<b>Option C - extend to 12 months.</b> Covers the full first-year risk window at an estimated $19M annual state share. Aligns with the standing federal option, making implementation administratively straightforward. Twenty-plus states have adopted this approach; early evaluations show reduced coverage interruption, with mortality effects not yet measurable.”</p><p><b>Considerations:</b> “Implementation would begin with the next plan year; the estimate's largest uncertainty is retention (we assume 60% of eligible women remain enrolled - each ten-point change moves the state share about $3M). Neighboring states' early experience will provide sharper enrollment data within a year, and any evaluation should track postpartum emergency visits and behavioral-health utilization, where effects should appear first.”</p><p><b>The craft to notice:</b> no adjectives are doing argumentative work, the opposition's concern (recurring cost) is treated as legitimate, and the numbers from Task 2 appear with their assumptions attached. Policy writing is trust engineering - the brief is judged by whether the <i>losing</i> side still cites your numbers.</p>"
 }
 ]
 },

 ],
 experiences: [
 "Nashville: <b>The Sycamore Institute internships</b>, <b>Tennessee Justice Center health policy internships</b>, <b>TN Dept. of Health internships & fellowships</b>, <b>Metro Public Health Department</b>",
 "D.C. pipeline: <b>congressional internships</b> (health committees), <b>KFF, Brookings, Urban Institute, Mathematica, CBPP internships</b>",
 "Federal: <b>CDC Pathways / Public Health Associate Program (PHAP)</b>, <b>HHS/CMS Pathways internships</b>, <b>ORISE fellowships</b>",
 "Population health on campus: <b>Health Equity Research Project</b>, community organizations (Siloam Health, Neighborhood Health volunteer roles)"
 ],
 now: [
 "Read three KFF issue briefs and reverse-engineer their structure - that structure is the job",
 "Write one practice policy brief (this project's Task 4 counts) and have a professor tear it apart",
 "Follow the state legislature's health committee for one session cycle; Tennessee's is a masterclass happening two miles from campus",
 "Sign up for one health-policy newsletter (KFF Health News, or the Sycamore Institute's Tennessee-focused one) and actually read it"
 ]
 }
});

</script>
<script>
/* ============================================================
   App - hash router, quiz engine, progress in localStorage.
   ============================================================ */
(function () {
  var TRACKS = window.EXPLORER_TRACKS || [];
  var QUIZ = window.EXPLORER_QUIZ || [];
  var app = document.getElementById('app');
  var PKEY = 'vhce-progress-v1';

  /* ---------- glyphs: one small line drawing per track ---------- */
  var GLYPHS = {
    compass: '<svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M15.5 8.5 13 13l-4.5 2.5L11 11z"/></svg>',
    ledger:  '<svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19 9 12l4 3 7-9"/><path d="M16 6h4v4"/></svg>',
    flow:    '<svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="6" height="6" rx="1"/><rect x="15" y="14" width="6" height="6" rx="1"/><path d="M9 7h5a2 2 0 0 1 2 2v5"/><path d="m14.6 11.6 1.4 2.4 2.4-1.4"/></svg>',
    grid:    '<svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="1.6"><ellipse cx="12" cy="6" rx="7" ry="2.6"/><path d="M5 6v6c0 1.4 3.1 2.6 7 2.6s7-1.2 7-2.6V6"/><path d="M5 12v6c0 1.4 3.1 2.6 7 2.6s7-1.2 7-2.6v-6"/></svg>',
    flask:   '<svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M10 3h4M11 3v6l-5.2 8.7A2 2 0 0 0 7.5 21h9a2 2 0 0 0 1.7-3.3L13 9V3"/><path d="M8.5 15h7"/></svg>',
    capitol: '<svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 21h16M5 21v-8m14 8v-8M3 13h18l-9-6z"/><path d="M9 21v-5m3 5v-5m3 5v-5M12 7V4l2.5 1L12 6"/></svg>'
  };

  /* ---------- progress ---------- */
  function loadProgress() {
    try { return JSON.parse(localStorage.getItem(PKEY)) || {}; } catch (e) { return {}; }
  }
  function saveProgress(p) {
    try { localStorage.setItem(PKEY, JSON.stringify(p)); } catch (e) {}
  }
  function taskDone(trackId, i) {
    var p = loadProgress();
    return !!(p[trackId] && p[trackId][i]);
  }
  function setTaskDone(trackId, i, val) {
    var p = loadProgress();
    p[trackId] = p[trackId] || {};
    if (val) p[trackId][i] = true; else delete p[trackId][i];
    saveProgress(p);
  }
  function trackProgress(t) {
    var n = 0;
    for (var i = 0; i < t.project.tasks.length; i++) if (taskDone(t.id, i)) n++;
    return { done: n, total: t.project.tasks.length };
  }

  /* ---------- tiny helpers ---------- */
  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }
  function el(html) {
    var t = document.createElement('template');
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }
  function chips(arr, cls) {
    return arr.map(function (c) { return '<span class="chip ' + (cls || '') + '">' + esc(c) + '</span>'; }).join('');
  }

  /* ---------- home view ---------- */
  function renderHome() {
    document.title = 'Vanderbilt Non-Clinical Healthcare Explorer';
    var cards = TRACKS.map(function (t) {
      var pr = trackProgress(t);
      var donePill = pr.done === pr.total ? '<span class="done-pill">Project complete</span>'
        : (pr.done > 0 ? '<span class="done-pill">' + pr.done + '/' + pr.total + ' tasks</span>' : '');
      return '<a class="track-card" href="#/track/' + t.id + '" style="--track:' + t.color + ';--track-wash:' + t.wash + '">' +
        donePill +
        '<span class="glyph" aria-hidden="true">' + GLYPHS[t.glyph] + '</span>' +
        '<h3>' + esc(t.name) + '</h3>' +
        '<span class="tag">' + esc(t.short) + '</span>' +
        '<span class="meta"><span>' + t.project.tasks.length + '-task project</span><span>&asymp; ' + esc(t.project.duration) + '</span><span>' + esc(t.entryTitle) + '</span></span>' +
        '</a>';
    }).join('');

    app.innerHTML =
      '<div class="hero">' +
        '<p class="hero-eyebrow">For Vanderbilt students &middot; No white coat required</p>' +
        '<h1>Try six healthcare careers before you apply to one.</h1>' +
        '<p class="lede">Healthcare is a fifth of the U.S. economy, and most of the people who run it never touch a patient. This explorer lets you test-drive the non-clinical side: each track below opens with what the work actually is, then hands you a realistic mini-project with real data, real deliverables, and sample answers to compare against.</p>' +
        '<p class="fineprint">Each project takes roughly 2-3 hours. You need nothing but a notebook or a blank doc - and your progress saves in this browser.</p>' +
      '</div>' +
      '<div id="quizMount"></div>' +
      '<div class="grid-head"><h2>The six tracks</h2><span class="k">Ordered by nothing - start where you\'re curious</span></div>' +
      '<div class="track-grid">' + cards + '</div>' +
      '<footer class="colophon">Employer, course, and organization names on this site are real. Project scenarios use fictional client names and simplified data - they are teaching cases, not descriptions of real organizations.</footer>';

    renderQuiz(document.getElementById('quizMount'));
    window.scrollTo(0, 0);
  }

  /* ---------- quiz ---------- */
  var quizState = null; // {i, scores}
  function renderQuiz(mount) {
    if (!QUIZ.length) return;
    function paint() {
      var inner;
      if (!quizState) {
        inner = '<div class="quiz-head"><h2>Not sure where to start?</h2><span class="k">' + QUIZ.length + ' questions &middot; 2 minutes</span></div>' +
          '<div class="quiz-body"><p style="color:var(--ink-soft);max-width:62ch;margin:4px 0 16px">There are no wrong answers. You\'ll get the two or three tracks most worth your next hour.</p>' +
          '<button class="quiz-start" type="button" data-act="start">Find my tracks</button></div>';
      } else if (quizState.i < QUIZ.length) {
        var q = QUIZ[quizState.i];
        inner = '<div class="quiz-head"><h2>Which fits you?</h2><span class="quiz-progress">Question ' + (quizState.i + 1) + ' of ' + QUIZ.length + '</span></div>' +
          '<div class="quiz-body"><p class="quiz-q">' + esc(q.q) + '</p><ul class="quiz-opts">' +
          q.opts.map(function (o, j) {
            return '<li><button class="quiz-opt" type="button" data-act="answer" data-j="' + j + '">' + esc(o.t) + '</button></li>';
          }).join('') + '</ul></div>';
      } else {
        var ranked = TRACKS.map(function (t) {
          return { t: t, s: quizState.scores[t.id] || 0 };
        }).sort(function (a, b) { return b.s - a.s; });
        var max = Math.max(1, ranked[0].s);
        inner = '<div class="quiz-head"><h2>Your best-fit tracks</h2><span class="k">Top match first - but read the runners-up too</span></div>' +
          '<div class="quiz-body"><div class="quiz-result-rank">' +
          ranked.slice(0, 4).map(function (r) {
            var pct = Math.round(100 * r.s / max);
            return '<a class="quiz-result-row" href="#/track/' + r.t.id + '" style="--track:' + r.t.color + '">' +
              '<span class="nm">' + esc(r.t.name) + '</span>' +
              '<span class="bar-wrap"><span class="bar" style="width:' + pct + '%"></span></span>' +
              '<span class="pct">' + pct + '%</span></a>';
          }).join('') +
          '</div><p style="font-size:.82rem;color:var(--ink-faint);margin:14px 0 0">A two-minute quiz is a starting point, not a verdict. <button class="btn-ghost btn" type="button" data-act="retake" style="margin-left:8px">Retake</button></p></div>';
      }
      mount.innerHTML = '<div class="quiz-card">' + inner + '</div>';
    }
    mount.addEventListener('click', function (e) {
      var b = e.target.closest('[data-act]');
      if (!b) return;
      var act = b.getAttribute('data-act');
      if (act === 'start' || act === 'retake') {
        quizState = { i: 0, scores: {} };
      } else if (act === 'answer') {
        var q = QUIZ[quizState.i];
        var o = q.opts[parseInt(b.getAttribute('data-j'), 10)];
        for (var id in o.w) quizState.scores[id] = (quizState.scores[id] || 0) + o.w[id];
        quizState.i++;
      }
      paint();
    });
    paint();
  }

  /* ---------- track view ---------- */
  function renderTrack(t, restore) {
    document.title = t.name + ' - Vanderbilt Non-Clinical Healthcare Explorer';
    var pr = trackProgress(t);

    var stats = t.stats.map(function (s) {
      return '<span class="stat-chip">' + esc(s.k) + '<b>' + esc(s.v) + '</b></span>';
    }).join('');

    var roles = t.field.titles.map(function (r) {
      return '<div class="role-item"><b>' + esc(r.title) + '</b><span>' + esc(r.desc) + '</span></div>';
    }).join('');

    var day = t.field.day.map(function (d) {
      return '<li><time>' + esc(d.time) + '</time><span>' + esc(d.what) + '</span></li>';
    }).join('');

    var thrive = t.field.thrive.map(function (x) { return '<li>' + x + '</li>'; }).join('');

    var employers =
      '<div class="emp-group"><div class="lbl">Right here in Nashville</div><div class="chips">' + chips(t.field.employers.nashville, 'local') + '</div></div>' +
      '<div class="emp-group"><div class="lbl">National names that hire Vanderbilt students</div><div class="chips">' + chips(t.field.employers.national) + '</div></div>' +
      '';

    var tasks = t.project.tasks.map(function (task, i) {
      var done = taskDone(t.id, i);
      return '<div class="task' + (done ? ' done' : '') + '" data-task="' + i + '">' +
        '<button class="task-head" type="button" data-toggle="' + i + '" aria-expanded="false">' +
          '<span class="task-num">' + (done ? '&#10003;' : (i + 1)) + '</span>' +
          '<h4>' + esc(task.title) + '</h4>' +
          '<span class="mins">&asymp; ' + task.minutes + ' min</span>' +
          '<span class="caret" aria-hidden="true">&#9656;</span>' +
        '</button>' +
        '<div class="task-body" hidden>' +
          '<div class="task-skills">' + chips(task.skills) + '</div>' +
          '<div class="task-sec"><div class="lbl">The situation</div><div class="prose-t">' + task.brief + '</div></div>' +
          (task.data ? '<div class="task-sec"><div class="lbl">Your materials</div><div class="prose-t">' + task.data + '</div></div>' : '') +
          '<div class="task-sec"><div class="lbl">Your task</div><div class="prose-t">' + task.todo + '</div></div>' +
          (task.hint ? '<div class="task-sec"><div class="lbl">If you\'re stuck</div><div class="prose-t"><p>' + task.hint + '</p></div></div>' : '') +
          '<div class="task-sec">' +
            '<button class="reveal-btn" type="button" data-reveal="' + i + '">Done? Compare your work with a sample answer &darr;</button>' +
            '<div class="model-answer" hidden><div class="lbl">One good answer - not the only one</div><div class="prose-t">' + task.model + '</div></div>' +
          '</div>' +
          '<div class="task-done-row"><label><input type="checkbox" data-done="' + i + '"' + (done ? ' checked' : '') + '> Mark task ' + (i + 1) + ' complete</label></div>' +
        '</div>' +
      '</div>';
    }).join('');

    var completion = pr.done === pr.total
      ? '<div class="completion-banner"><b>Project complete.</b> You just did a compressed week of real ' + esc(t.name.toLowerCase()) + ' work. If any task felt energizing rather than draining, take that seriously - the next-steps list below is where to go from here.</div>'
      : '';

    var next =
      '<div class="cols">' +
        '<div class="panel"><h4>Courses &amp; programs at Vanderbilt</h4><ul>' + t.next.courses.map(function (x) { return '<li>' + x + '</li>'; }).join('') + '</ul></div>' +
        '<div class="panel"><h4>Student orgs &amp; campus experiences</h4><ul>' + t.next.campus.map(function (x) { return '<li>' + x + '</li>'; }).join('') + '</ul></div>' +
        '<div class="panel"><h4>Internships &amp; programs to target</h4><ul>' + t.next.experiences.map(function (x) { return '<li>' + x + '</li>'; }).join('') + '</ul></div>' +
        '<div class="panel"><h4>Do this month, from your dorm</h4><ul>' + t.next.now.map(function (x) { return '<li>' + x + '</li>'; }).join('') + '</ul></div>' +
      '</div>';

    app.innerHTML =
      '<div style="--track:' + t.color + ';--track-wash:' + t.wash + '">' +
      '<nav class="crumb"><a href="#/">&larr; All six tracks</a></nav>' +
      '<div class="track-hero">' +
        '<div class="glyph" aria-hidden="true">' + GLYPHS[t.glyph] + '</div>' +
        '<h1>' + esc(t.name) + '</h1>' +
        '<p class="tagline">' + esc(t.tagline) + '</p>' +
        '<div class="stat-row">' + stats + '</div>' +
      '</div>' +
      '<nav class="subnav" aria-label="Sections">' +
        '<a href="#/track/' + t.id + '" data-sec="field">The field</a>' +
        '<a href="#/track/' + t.id + '" data-sec="project">The project</a>' +
        '<a href="#/track/' + t.id + '" data-sec="next">Your next steps</a>' +
        '<span class="prog">' + pr.done + ' of ' + pr.total + ' tasks done</span>' +
      '</nav>' +

      '<section class="zone" id="field">' +
        '<h2 class="zone-title">What this work actually is</h2>' +
        '<p class="zone-sub">In plain language - before any job-posting jargon.</p>' +
        '<div class="prose">' + t.field.what.map(function (p) { return '<p>' + p + '</p>'; }).join('') + '</div>' +
        '<div class="callout"><b>What students get wrong:</b> ' + t.field.misconception + '</div>' +
        '<div class="cols">' +
          '<div class="panel"><h4>Job titles you\'d apply to</h4><div class="role-list">' + roles + '</div></div>' +
          '<div class="panel"><h4>A realistic Tuesday, two years in</h4><ul class="day-list">' + day + '</ul></div>' +
          '<div class="panel"><h4>You\'ll probably like this if&hellip;</h4><ul>' + thrive + '</ul></div>' +
          '<div class="panel"><h4>Who hires for this</h4>' + employers + '</div>' +
        '</div>' +
      '</section>' +

      '<section class="zone" id="project">' +
        '<h2 class="zone-title">The project: try the job</h2>' +
        '<p class="zone-sub">A virtual work sample: do the tasks in order, then compare your work against the sample answers.</p>' +
        '<div class="project-brief">' +
          '<span class="k">Your assignment</span>' +
          '<h3>' + esc(t.project.title) + '</h3>' +
          '<div class="cast">You are: <b>' + esc(t.project.role) + '</b> &middot; ' + esc(t.project.setting) + ' &middot; ' + esc(t.project.duration) + ' total</div>' +
          t.project.premise.map(function (p) { return '<p>' + p + '</p>'; }).join('') +
          '<p class="fiction-note">' + t.project.fictionNote + '</p>' +
        '</div>' +
        completion + tasks +
      '</section>' +

      '<section class="zone" id="next">' +
        '<h2 class="zone-title">Some suggestions for next steps</h2>' +
        next +
      '</section>' +
      '</div>';

    /* interactions */
    app.querySelectorAll('[data-toggle]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var wrap = btn.closest('.task');
        var body = wrap.querySelector('.task-body');
        var open = body.hasAttribute('hidden');
        if (open) { body.removeAttribute('hidden'); wrap.classList.add('open'); }
        else { body.setAttribute('hidden', ''); wrap.classList.remove('open'); }
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    });
    app.querySelectorAll('[data-reveal]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var ans = btn.parentElement.querySelector('.model-answer');
        var show = ans.hasAttribute('hidden');
        if (show) { ans.removeAttribute('hidden'); btn.textContent = 'Hide the sample answer ↑'; }
        else { ans.setAttribute('hidden', ''); btn.textContent = 'Done? Compare your work with a sample answer ↓'; }
      });
    });
    app.querySelectorAll('[data-done]').forEach(function (cb) {
      cb.addEventListener('change', function () {
        var open = [];
        app.querySelectorAll('.task.open').forEach(function (w) { open.push(w.getAttribute('data-task')); });
        setTaskDone(t.id, parseInt(cb.getAttribute('data-done'), 10), cb.checked);
        renderTrack(t, { y: window.scrollY, open: open }); // repaint counters + banner in place
      });
    });
    /* section tabs scroll within the page; the router hash stays on the track */
    app.querySelectorAll('.subnav a[data-sec]').forEach(function (lnk) {
      lnk.addEventListener('click', function (e) {
        e.preventDefault();
        var z = document.getElementById(lnk.getAttribute('data-sec'));
        if (z) z.scrollIntoView({
          behavior: window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 'auto' : 'smooth',
          block: 'start'
        });
      });
    });
    /* subnav highlight on scroll */
    var links = app.querySelectorAll('.subnav a');
    var zones = ['field', 'project', 'next'].map(function (id) { return document.getElementById(id); });
    function onScroll() {
      var y = window.scrollY + 130, cur = 0;
      zones.forEach(function (z, i) { if (z && z.offsetTop <= y) cur = i; });
      links.forEach(function (l, i) { l.classList.toggle('on', i === cur); });
    }
    window.removeEventListener('scroll', window.__vhceScroll || onScroll);
    window.__vhceScroll = onScroll;
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    if (restore) {
      (restore.open || []).forEach(function (i) {
        var w = app.querySelector('.task[data-task="' + i + '"]');
        if (!w) return;
        w.querySelector('.task-body').removeAttribute('hidden');
        w.classList.add('open');
        w.querySelector('.task-head').setAttribute('aria-expanded', 'true');
      });
      window.scrollTo(0, restore.y || 0);
    } else {
      window.scrollTo(0, 0);
    }
  }

  /* ---------- theme toggle ---------- */
  document.getElementById('themeBtn').addEventListener('click', function () {
    var root = document.documentElement;
    var cur = root.getAttribute('data-theme');
    if (!cur) cur = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    root.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
  });

  /* ---------- router ---------- */
  function route() {
    var h = location.hash || '#/';
    var m = h.match(/^#\/track\/([a-z0-9-]+)/);
    if (m) {
      var t = null;
      for (var i = 0; i < TRACKS.length; i++) if (TRACKS[i].id === m[1]) t = TRACKS[i];
      if (t) { renderTrack(t); return; }
    }
    renderHome();
  }
  window.addEventListener('hashchange', route);
  route();
})();
</script>
</body>
</html>
