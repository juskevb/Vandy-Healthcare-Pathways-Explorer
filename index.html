<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vanderbilt Non-Clinical Healthcare Explorer</title>
<style>
/* ============================================================
   Tokens - light is the default; dark redefines tokens only.
   ============================================================ */
:root {
  --paper: #faf7f0;
  --paper-raised: #ffffff;
  --paper-sunken: #f1ecdf;
  --ink: #181610;
  --ink-soft: #4f4a3c;
  --ink-faint: #857d68;
  --line: #ddd5c2;
  --line-strong: #c3b895;
  --accent: #8f6b1d;
  --accent-ink: #6e5115;
  --accent-wash: #f3ead3;
  --good: #3d6b34;
  --good-wash: #e8efe2;
  --track: #8f6b1d;        /* per-track hue, set inline per page */
  --track-wash: #f3ead3;
  --shadow: 0 1px 2px rgba(24,22,16,.06), 0 6px 18px -8px rgba(24,22,16,.14);
  --radius: 10px;
  --serif: "Charter", "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  --sans: "Seravek", "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
  --mono: "SF Mono", "Cascadia Code", Consolas, "Liberation Mono", Menlo, monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --paper: #16140e;
    --paper-raised: #1e1b13;
    --paper-sunken: #100e09;
    --ink: #ece5d3;
    --ink-soft: #b5ac93;
    --ink-faint: #7d7560;
    --line: #35301f;
    --line-strong: #4d4529;
    --accent: #d3a94f;
    --accent-ink: #e2be6c;
    --accent-wash: #2a2412;
    --good: #8db97f;
    --good-wash: #1d2617;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px -10px rgba(0,0,0,.55);
  }
}
:root[data-theme="light"] {
  --paper: #faf7f0; --paper-raised: #ffffff; --paper-sunken: #f1ecdf;
  --ink: #181610; --ink-soft: #4f4a3c; --ink-faint: #857d68;
  --line: #ddd5c2; --line-strong: #c3b895;
  --accent: #8f6b1d; --accent-ink: #6e5115; --accent-wash: #f3ead3;
  --good: #3d6b34; --good-wash: #e8efe2;
  --shadow: 0 1px 2px rgba(24,22,16,.06), 0 6px 18px -8px rgba(24,22,16,.14);
}
:root[data-theme="dark"] {
  --paper: #16140e; --paper-raised: #1e1b13; --paper-sunken: #100e09;
  --ink: #ece5d3; --ink-soft: #b5ac93; --ink-faint: #7d7560;
  --line: #35301f; --line-strong: #4d4529;
  --accent: #d3a94f; --accent-ink: #e2be6c; --accent-wash: #2a2412;
  --good: #8db97f; --good-wash: #1d2617;
  --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px -10px rgba(0,0,0,.55);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  *, *::before, *::after { animation: none !important; transition: none !important; }
}
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent-ink); }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }

/* ---------- chrome ---------- */
.masthead {
  border-bottom: 1px solid var(--line);
  background: var(--paper);
  position: sticky; top: 0; z-index: 40;
}
.masthead-inner {
  max-width: 1060px; margin: 0 auto; padding: 12px 24px;
  display: flex; align-items: baseline; gap: 14px;
}
.wordmark {
  font-family: var(--serif); font-size: 1.05rem; font-weight: 700;
  color: var(--ink); text-decoration: none; letter-spacing: .01em;
  white-space: nowrap;
}
.wordmark .amp { color: var(--accent); }
.masthead-sub {
  font-size: .72rem; text-transform: uppercase; letter-spacing: .14em;
  color: var(--ink-faint);
}
.masthead-spacer { flex: 1; }
.theme-btn {
  border: 1px solid var(--line); background: var(--paper-raised); color: var(--ink-soft);
  border-radius: 999px; font: inherit; font-size: .78rem; padding: 3px 12px; cursor: pointer;
  align-self: center;
}
.theme-btn:hover { border-color: var(--line-strong); }

.shell { max-width: 1060px; margin: 0 auto; padding: 0 24px 96px; }

/* ---------- home: hero ---------- */
.hero { padding: 64px 0 40px; border-bottom: 1px solid var(--line); }
.hero-eyebrow {
  font-size: .74rem; text-transform: uppercase; letter-spacing: .16em;
  color: var(--accent-ink); margin: 0 0 14px;
}
.hero h1 {
  font-family: var(--serif); font-weight: 700;
  font-size: clamp(1.9rem, 4.4vw, 3rem); line-height: 1.12;
  margin: 0 0 18px; max-width: 21ch; text-wrap: balance;
}
.hero p.lede { font-size: 1.06rem; color: var(--ink-soft); max-width: 62ch; margin: 0 0 8px; }
.hero p.fineprint { font-size: .84rem; color: var(--ink-faint); max-width: 62ch; margin: 10px 0 0; }

/* ---------- quiz ---------- */
.quiz-card {
  margin: 40px 0 8px; border: 1px solid var(--line); border-radius: var(--radius);
  background: var(--paper-raised); box-shadow: var(--shadow); overflow: hidden;
}
.quiz-head { padding: 20px 26px 0; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
.quiz-head h2 { font-family: var(--serif); font-size: 1.3rem; margin: 0; }
.quiz-head .k { font-size: .74rem; text-transform: uppercase; letter-spacing: .14em; color: var(--ink-faint); }
.quiz-body { padding: 14px 26px 24px; }
.quiz-q { font-weight: 600; margin: 6px 0 12px; }
.quiz-progress { font-size: .78rem; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
.quiz-opts { display: grid; gap: 8px; margin: 0; padding: 0; list-style: none; }
.quiz-opt {
  text-align: left; font: inherit; cursor: pointer; width: 100%;
  border: 1px solid var(--line); background: var(--paper); color: var(--ink);
  border-radius: 8px; padding: 10px 14px; line-height: 1.45;
}
.quiz-opt:hover { border-color: var(--accent); background: var(--accent-wash); }
.quiz-start, .btn {
  display: inline-block; border: none; cursor: pointer; text-decoration: none;
  background: var(--accent); color: var(--paper); font: inherit; font-weight: 600;
  font-size: .92rem; padding: 9px 20px; border-radius: 999px;
}
:root[data-theme="dark"] .quiz-start, :root[data-theme="dark"] .btn { color: #16140e; }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .quiz-start, :root:not([data-theme="light"]) .btn { color: #16140e; } }
.btn-ghost {
  background: transparent; color: var(--accent-ink);
  border: 1px solid var(--line-strong);
}
.quiz-result-rank { display: grid; gap: 10px; margin-top: 14px; }
.quiz-result-row {
  display: flex; align-items: center; gap: 14px;
  border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px;
  background: var(--paper); text-decoration: none; color: var(--ink);
}
.quiz-result-row:hover { border-color: var(--track); }
.quiz-result-row .bar-wrap { flex: 1; height: 6px; background: var(--paper-sunken); border-radius: 3px; overflow: hidden; }
.quiz-result-row .bar { height: 100%; background: var(--track); border-radius: 3px; }
.quiz-result-row .pct { font-variant-numeric: tabular-nums; font-size: .82rem; color: var(--ink-faint); width: 3.4em; text-align: right; }
.quiz-result-row .nm { font-weight: 600; width: 17em; max-width: 45vw; }

/* ---------- home: track grid ---------- */
.grid-head { display: flex; align-items: baseline; gap: 14px; margin: 48px 0 18px; }
.grid-head h2 { font-family: var(--serif); font-size: 1.5rem; margin: 0; }
.grid-head .k { font-size: .78rem; color: var(--ink-faint); }
.track-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.track-card {
  border: 1px solid var(--line); border-radius: var(--radius); background: var(--paper-raised);
  padding: 20px 22px 18px; text-decoration: none; color: var(--ink);
  display: flex; flex-direction: column; gap: 8px; box-shadow: var(--shadow);
  position: relative;
}
.track-card:hover { border-color: var(--track); }
.track-card .glyph { color: var(--track); height: 26px; }
.track-card h3 { font-family: var(--serif); font-size: 1.18rem; margin: 2px 0 0; line-height: 1.25; text-wrap: balance; }
.track-card .tag { color: var(--ink-soft); font-size: .9rem; flex: 1; }
.track-card .meta {
  display: flex; gap: 14px; font-size: .74rem; color: var(--ink-faint);
  border-top: 1px solid var(--line); padding-top: 10px; margin-top: 6px;
  font-variant-numeric: tabular-nums;
}
.track-card .done-pill {
  position: absolute; top: 16px; right: 16px;
  font-size: .7rem; letter-spacing: .06em; color: var(--good);
  background: var(--good-wash); border-radius: 999px; padding: 2px 9px;
}

/* ---------- track page ---------- */
.crumb { padding: 22px 0 0; font-size: .84rem; }
.crumb a { color: var(--ink-faint); text-decoration: none; }
.crumb a:hover { color: var(--accent-ink); }
.track-hero { padding: 26px 0 26px; border-bottom: 1px solid var(--line); }
.track-hero .glyph { color: var(--track); height: 34px; margin-bottom: 10px; }
.track-hero h1 {
  font-family: var(--serif); font-size: clamp(1.7rem, 3.6vw, 2.5rem);
  margin: 0 0 10px; line-height: 1.15; text-wrap: balance;
}
.track-hero .tagline { font-size: 1.04rem; color: var(--ink-soft); max-width: 64ch; margin: 0 0 18px; }
.stat-row { display: flex; flex-wrap: wrap; gap: 10px; }
.stat-chip {
  border: 1px solid var(--line); background: var(--paper-raised); border-radius: 8px;
  padding: 8px 14px; font-size: .8rem; color: var(--ink-soft);
}
.stat-chip b { display: block; color: var(--ink); font-size: .92rem; }

.subnav {
  position: sticky; top: 49px; z-index: 30; background: var(--paper);
  border-bottom: 1px solid var(--line); display: flex; gap: 4px; overflow-x: auto;
}
.subnav a {
  text-decoration: none; color: var(--ink-faint); font-size: .84rem; font-weight: 600;
  padding: 11px 14px 9px; border-bottom: 2px solid transparent; white-space: nowrap;
}
.subnav a:hover, .subnav a.on { color: var(--ink); border-bottom-color: var(--track); }
.subnav .prog { margin-left: auto; align-self: center; font-size: .76rem; color: var(--ink-faint); padding-right: 6px; font-variant-numeric: tabular-nums; white-space: nowrap; }

section.zone { padding: 40px 0 8px; scroll-margin-top: 108px; }
.zone-title { font-family: var(--serif); font-size: 1.45rem; margin: 0 0 6px; }
.zone-sub { color: var(--ink-faint); font-size: .88rem; margin: 0 0 22px; }

.prose { max-width: 68ch; }
.prose p { margin: 0 0 14px; color: var(--ink-soft); }
.prose p strong, .prose li strong { color: var(--ink); }
.callout {
  border-left: 3px solid var(--track); background: var(--paper-raised);
  border-radius: 0 8px 8px 0; padding: 12px 18px; margin: 20px 0; max-width: 68ch;
  font-size: .93rem; color: var(--ink-soft);
}
.callout b { color: var(--ink); }

.cols { columns: 3 290px; column-gap: 22px; margin: 26px 0; }
.cols > .panel { break-inside: avoid; margin-bottom: 22px; }
.panel { border: 1px solid var(--line); border-radius: var(--radius); background: var(--paper-raised); padding: 18px 20px; }
.panel h4 { margin: 0 0 10px; font-size: .78rem; text-transform: uppercase; letter-spacing: .13em; color: var(--ink-faint); font-weight: 600; }
.panel ul { margin: 0; padding-left: 18px; color: var(--ink-soft); font-size: .93rem; }
.panel li { margin-bottom: 7px; }
.panel li b { color: var(--ink); font-weight: 600; }

.role-list { display: grid; gap: 0; }
.role-item { padding: 11px 0; border-bottom: 1px solid var(--line); font-size: .93rem; }
.role-item:last-child { border-bottom: none; }
.role-item b { display: block; color: var(--ink); }
.role-item span { color: var(--ink-soft); }

.day-list { list-style: none; margin: 0; padding: 0; }
.day-list li { display: flex; gap: 14px; padding: 8px 0; border-bottom: 1px dotted var(--line); font-size: .92rem; }
.day-list li:last-child { border-bottom: none; }
.day-list time { font-family: var(--mono); font-size: .8rem; color: var(--track); white-space: nowrap; padding-top: 2px; min-width: 4.6em; }
.day-list span { color: var(--ink-soft); }

.emp-group { margin-bottom: 14px; }
.emp-group .lbl { font-size: .74rem; text-transform: uppercase; letter-spacing: .12em; color: var(--ink-faint); margin-bottom: 8px; }
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip {
  font-size: .8rem; border: 1px solid var(--line); border-radius: 999px;
  padding: 3px 11px; color: var(--ink-soft); background: var(--paper-raised);
}
.chip.local { border-color: var(--track); color: var(--ink); }
.chip-note { font-size: .76rem; color: var(--ink-faint); margin-top: 8px; }

/* ---------- project ---------- */
.project-brief {
  border: 1px solid var(--line-strong); border-radius: var(--radius);
  background: var(--paper-raised); box-shadow: var(--shadow);
  padding: 24px 28px; margin: 0 0 30px;
}
.project-brief .k { font-size: .72rem; text-transform: uppercase; letter-spacing: .15em; color: var(--track); font-weight: 600; }
.project-brief h3 { font-family: var(--serif); font-size: 1.5rem; margin: 6px 0 4px; text-wrap: balance; }
.project-brief .cast { font-size: .88rem; color: var(--ink-faint); margin-bottom: 14px; }
.project-brief p { color: var(--ink-soft); max-width: 70ch; margin: 0 0 12px; }
.fiction-note { font-size: .8rem; color: var(--ink-faint); border-top: 1px dotted var(--line); padding-top: 12px; margin-top: 4px; }

.task { border: 1px solid var(--line); border-radius: var(--radius); background: var(--paper-raised); margin-bottom: 14px; overflow: hidden; }
.task.open { border-color: var(--line-strong); box-shadow: var(--shadow); }
.task-head {
  display: flex; align-items: center; gap: 16px; width: 100%; text-align: left;
  background: none; border: none; font: inherit; color: inherit; cursor: pointer;
  padding: 16px 20px;
}
.task-num {
  font-family: var(--mono); font-size: .82rem; color: var(--track);
  border: 1px solid var(--track); border-radius: 999px;
  width: 30px; height: 30px; display: grid; place-items: center; flex-shrink: 0;
}
.task.done .task-num { background: var(--track); color: var(--paper); }
.task-head h4 { margin: 0; font-size: 1.02rem; flex: 1; }
.task-head .mins { font-size: .76rem; color: var(--ink-faint); font-variant-numeric: tabular-nums; white-space: nowrap; }
.task-head .caret { color: var(--ink-faint); transition: transform .15s; }
.task.open .caret { transform: rotate(90deg); }
.task-body { border-top: 1px solid var(--line); padding: 22px 24px 24px; }
.task-skills { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 16px; }
.task-skills .chip { font-size: .72rem; }

.task-sec { margin-bottom: 20px; }
.task-sec > .lbl {
  font-size: .72rem; text-transform: uppercase; letter-spacing: .14em;
  color: var(--ink-faint); font-weight: 600; margin-bottom: 8px;
}
.task-sec .prose-t { max-width: 70ch; color: var(--ink-soft); font-size: .95rem; }
.task-sec .prose-t p { margin: 0 0 10px; }
.task-sec .prose-t ul, .task-sec .prose-t ol { margin: 0 0 10px; padding-left: 20px; }
.task-sec .prose-t li { margin-bottom: 6px; }
.task-sec .prose-t b, .task-sec .prose-t strong { color: var(--ink); }

.data-block { border: 1px solid var(--line); border-radius: 8px; background: var(--paper-sunken); padding: 4px 14px 10px; overflow-x: auto; margin: 10px 0; }
table.d { border-collapse: collapse; font-family: var(--mono); font-size: .78rem; margin: 10px 0 4px; min-width: 480px; }
table.d caption { text-align: left; font-family: var(--sans); font-size: .78rem; color: var(--ink-faint); padding: 6px 0; caption-side: top; }
table.d th { text-align: left; font-weight: 600; color: var(--ink); border-bottom: 1px solid var(--line-strong); padding: 5px 14px 5px 0; white-space: nowrap; }
table.d td { border-bottom: 1px dotted var(--line); padding: 5px 14px 5px 0; color: var(--ink-soft); font-variant-numeric: tabular-nums; white-space: nowrap; }
table.d td.num, table.d th.num { text-align: right; }
pre.code {
  font-family: var(--mono); font-size: .8rem; line-height: 1.55; color: var(--ink);
  background: var(--paper-sunken); border: 1px solid var(--line); border-radius: 8px;
  padding: 14px 16px; overflow-x: auto; margin: 10px 0;
}

.reveal-btn {
  border: 1px dashed var(--line-strong); background: var(--accent-wash); color: var(--accent-ink);
  font: inherit; font-size: .86rem; font-weight: 600; cursor: pointer;
  border-radius: 8px; padding: 10px 16px; width: 100%; text-align: left;
}
.reveal-btn:hover { border-style: solid; }
.model-answer { border: 1px solid var(--line-strong); border-radius: 8px; background: var(--accent-wash); padding: 16px 20px; margin-top: 10px; }
.model-answer .lbl { font-size: .72rem; text-transform: uppercase; letter-spacing: .14em; color: var(--accent-ink); font-weight: 700; margin-bottom: 10px; }
.model-answer .prose-t { color: var(--ink-soft); font-size: .93rem; max-width: 70ch; }
.model-answer .prose-t p { margin: 0 0 10px; }
.model-answer .prose-t ul, .model-answer .prose-t ol { margin: 0 0 10px; padding-left: 20px; }
.model-answer .prose-t li { margin-bottom: 6px; }
.model-answer .prose-t b { color: var(--ink); }
.model-answer table.d { background: transparent; }

.task-done-row { display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--line); padding-top: 16px; margin-top: 6px; }
.task-done-row label { font-size: .9rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 9px; }
.task-done-row input { width: 17px; height: 17px; accent-color: var(--track); cursor: pointer; }
.completion-banner {
  border: 1px solid var(--good); background: var(--good-wash); color: var(--ink);
  border-radius: var(--radius); padding: 16px 22px; margin: 18px 0; font-size: .95rem;
}
.completion-banner b { color: var(--good); }

/* ---------- next steps ---------- */
.next-note { font-size: .85rem; color: var(--ink-faint); max-width: 70ch; margin-top: 18px; border-top: 1px dotted var(--line); padding-top: 14px; }

footer.colophon {
  border-top: 1px solid var(--line); margin-top: 70px; padding: 22px 0 0;
  font-size: .8rem; color: var(--ink-faint); max-width: 72ch;
}
@media (max-width: 640px) {
  .shell { padding: 0 16px 72px; }
  .masthead-sub { display: none; }
  .quiz-result-row .nm { width: auto; }
  .task-head { padding: 14px 14px; gap: 10px; }
  .task-body { padding: 16px 14px 18px; }
}
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-inner">
    <a class="wordmark" href="#/">Healthcare, <span class="amp">beyond the clinic</span></a>
    <span class="masthead-sub">A Vanderbilt career exploration tool</span>
    <span class="masthead-spacer"></span>
    <button class="theme-btn" id="themeBtn" type="button" aria-label="Toggle color theme">Theme</button>
  </div>
</header>

<main class="shell" id="app" aria-live="polite"></main>

<script>
/* Fit quiz - each answer adds weight toward one or more tracks.
 Track ids: strategy-consulting, finance-investing, operations-administration,
 data-analytics-technology, research-scientific-affairs, health-policy-population-health */
window.EXPLORER_QUIZ = [
 {
 q: "It's 11pm and you're weirdly energized by an assignment. Which one is it?",
 opts: [
 { t: "Cracking open a messy, ambiguous question no one has structured yet", w: { "strategy-consulting": 3, "health-policy-population-health": 1 } },
 { t: "A spreadsheet where the numbers finally tie out", w: { "finance-investing": 3, "data-analytics-technology": 1 } },
 { t: "Reorganizing a group project so it actually runs on time", w: { "operations-administration": 3 } },
 { t: "A dataset with a pattern hiding in it", w: { "data-analytics-technology": 3, "research-scientific-affairs": 1 } }
 ]
 },
 {
 q: "Which headline would you actually click first?",
 opts: [
 { t: "“Why this hospital chain is betting big on outpatient surgery”", w: { "strategy-consulting": 2, "operations-administration": 1, "finance-investing": 1 } },
 { t: "“Inside the $9B deal reshaping kidney care”", w: { "finance-investing": 3 } },
 { t: "“New trial data could change how heart failure is treated”", w: { "research-scientific-affairs": 3 } },
 { t: "“What happens when a state extends postpartum Medicaid coverage”", w: { "health-policy-population-health": 3 } }
 ]
 },
 {
 q: "Pick the compliment you'd most want on a performance review.",
 opts: [
 { t: "“Gives the clearest recommendation in the room”", w: { "strategy-consulting": 3 } },
 { t: "“Nothing gets past them - flawless detail under pressure”", w: { "finance-investing": 3 } },
 { t: "“People and processes just work better around them”", w: { "operations-administration": 3 } },
 { t: "“Translates complexity so anyone can act on it”", w: { "data-analytics-technology": 2, "health-policy-population-health": 1, "research-scientific-affairs": 1 } }
 ]
 },
 {
 q: "Your ideal relationship with science and medicine:",
 opts: [
 { t: "I love the science itself - trials, mechanisms, evidence", w: { "research-scientific-affairs": 3, "data-analytics-technology": 1 } },
 { t: "I care about health, but I'd rather work the business side", w: { "strategy-consulting": 2, "finance-investing": 2 } },
 { t: "I want to make the system fairer for whole communities", w: { "health-policy-population-health": 3 } },
 { t: "I want hospitals and clinics to simply run better for patients", w: { "operations-administration": 3 } }
 ]
 },
 {

<script>

 id: "strategy-consulting",
 name: "Strategy & Consulting",
 short: "Hospitals, health plans, and drug companies pay outside teams to answer their hardest questions. You're the team.",
 color: "#a3781f",
 wash: "#f3ead3",
 glyph: "compass",
 entryTitle: "Entry role: Analyst / Associate",
 tagline: "Consultants get hired when a healthcare organization faces a question too big, too urgent, or too politically loaded to answer internally: Should we build it? Buy it? Fix it? Exit it? Your job is to turn ambiguity into a defensible recommendation in about six weeks.",
 stats: [
 { k: "Entry job titles", v: "Business Analyst, Associate Consultant" },
 { k: "Recruiting starts", v: "Sophomore-junior year (early!)" },
 { k: "Signature deliverable", v: "A slide deck a CEO acts on" },
 { k: "Nashville advantage", v: "Huron, Chartis & ECG have offices here" }
 ],
 field: {
 what: [
 "A hospital system is losing surgical cases to a competitor. A health plan wants to know whether to cover a new digital therapy. A private equity firm needs someone to pressure-test a clinic chain before writing a nine-figure check. In each case, leadership hires a consulting team - typically two to six people - that parachutes in, gathers data, interviews stakeholders, builds analysis, and delivers a recommendation with the evidence to back it.",
 "As the analyst on that team, you own the engine room: you build the Excel models, dig through claims and market data, draft the slides, and increasingly present your own sections to the client. The partners bring relationships and judgment; you bring speed, rigor, and the first draft of the answer. It is the fastest apprenticeship in business - you'll see more organizations in two years than most executives see in twenty.",
 "Healthcare is one of consulting's biggest practice areas because the industry is enormous, heavily regulated, and constantly being reshaped by policy and technology. Firms range from generalists with health practices (McKinsey, Bain, BCG, Deloitte) to healthcare pure-plays (Chartis, ECG, Clearview, Health Advances) - the pure-plays often go deeper clinically, the generalists rotate you across industries."
 ],
 misconception: "That consulting requires a business major. Firms deliberately hire biology, MHS, economics, and engineering majors - they teach you the frameworks in training. What they can't teach (and screen hard for in case interviews) is structured thinking: can you break a fuzzy question into pieces, do quick math out loud, and communicate a clear answer under pressure?",
 titles: [
 { title: "Business Analyst / Associate Consultant", desc: "The undergrad entry role at McKinsey, Bain, BCG, L.E.K., and most boutiques. Research, modeling, slide-building, client interviews." },
 { title: "Healthcare Analyst (boutique)", desc: "Same work at healthcare specialists like Chartis, ECG, Clearview, Putnam - deeper clinical content, less industry-hopping." },
 { title: "Research Analyst (Advisory Board)", desc: "Best-practice research for hundreds of hospital members instead of one client at a time. Writing-heavy, great teacher of the industry." },
 { title: "Decision Analytics Associate (ZS)", desc: "The data-science flavor of consulting - pharma commercial analytics, sales-force sizing, market models." }
 ],
 day: [
 { time: "8:30a", what: "Team check-in: partner reshuffles this week's priorities after last night's client call." },
 { time: "9:00a", what: "Rebuild the surgical-volume model with the client's actual case data that finally arrived." },
 { time: "11:00a", what: "Interview an orthopedic surgeon about why cases are leaving - your third of five stakeholder interviews." },
 { time: "12:30p", what: "Lunch at your desk; skim a Sg2 market forecast for the metro area." },
 { time: "1:30p", what: "Turn this morning's analysis into six slides; agonize over one chart title until it states the insight." },

 { time: "6:30p", what: "Send the revised deck to the manager; prep tomorrow's client working session." }
 ],
 employers: {
 nashville: ["Huron (Nashville office)", "The Chartis Group (Nashville)", "ECG Management Consultants (Nashville)", "Jarrard Inc.", "C3 Consulting", "Cumberland Consulting (Cognizant)"],
 national: ["McKinsey & Company", "Bain & Company", "BCG", "L.E.K. Consulting", "Deloitte LSHC", "Oliver Wyman Health", "EY-Parthenon", "ZS Associates", "Clearview Healthcare Partners", "Health Advances", "Putnam Associates", "Advisory Board (Optum)", "Guidehouse", "Alvarez & Marsal Healthcare", "Trinity Life Sciences"]
 },
 thrive: [
 "You like the <b>question</b> more than any particular subject - this month it's surgery centers, next month it's a pharma launch",
 "Deadlines sharpen you instead of flattening you",

 "You want maximum learning per year early in your career and you'll trade some lifestyle for it"

 },
 project: {
 title: "Should Riverbend Health build an outpatient surgery center?",
 role: "Analyst, Harpeth Strategy Group (a healthcare strategy boutique in Nashville)",
 setting: "6-week engagement, week 2",
 duration: "≈ 2 hours",
 premise: [
 "Your client is <b>Riverbend Health</b>, a three-hospital nonprofit system in Middle Tennessee. Its CEO has watched orthopedic surgeons drift cases to a competitor's new ambulatory surgery center (ASC) - a freestanding outpatient facility where procedures cost payers roughly a third less than in a hospital. The board meets in five weeks and wants a recommendation: <b>build our own ASC, partner with the surgeons on a joint venture, or defend the status quo?</b>",
 "The partner leading the engagement has given you, the analyst, four classic workstreams. Work them in order - each one is a real task that a first-year analyst would own."
 ],
 fictionNote: "Riverbend Health and Harpeth Strategy Group are fictional teaching constructs; the numbers are simplified but directionally realistic. The dynamic - payers pushing surgery out of hospitals and into ASCs - is one of the biggest forces in U.S. healthcare right now, and a scenario very much like this one runs inside real firms like Chartis, ECG, and Huron every month.",
 tasks: [
 {
 title: "Structure the problem before touching any data",
 minutes: 25,
 skills: ["MECE thinking", "Issue trees", "Hypothesis-driven work"],
 brief: "<p>Day one of any engagement, before any analysis, a good consultant asks: <i>what would we need to believe for each answer to be right?</i> The tool for this is an <b>issue tree</b> - breaking the big question into a handful of sub-questions that are <b>MECE</b>: mutually exclusive (no overlaps) and collectively exhaustive (nothing important missing). The tree becomes the project plan: every branch gets an owner, an analysis, and a deadline.</p>",
 todo: "<ol><li>Write the decision question at the top of a page: <i>“Should Riverbend build, partner, or hold?”</i></li><li>Break it into 3-5 major branches - the big things that must be true or false for the answer to change.</li><li>Under each branch, list 2-3 specific questions you could actually analyze with data or interviews.</li><li>Check yourself: do any branches overlap? Is anything a board member would ask missing?</li></ol>",
 hint: "Almost every market-entry tree has some version of: Is the market attractive? Can <i>we</i> win in it? Do the economics work for <i>us</i>? What are the risks of acting - and of not acting?",
 model: "<p>One classic four-branch tree:</p><ol><li><b>Market: is outpatient surgery in our metro worth chasing?</b> - How many cases today, growing how fast? Which procedures are moving to ASCs, and what do payers want?</li><li><b>Position: would we win share or just move our own cases?</b> - Where do our surgeons operate today and what would make them shift? What has the competitor ASC actually taken from us?</li><li><b>Economics: does an ASC create or destroy margin for the system?</b> - Per-case margin in an ASC vs. our hospitals; cannibalization vs. retention vs. new capture; build cost and break-even volume.</li><li><b>Execution & risk: can we pull it off?</b> - Physician joint-venture terms, certificate-of-need regulation, staffing, and the risk of doing nothing while payers steer cases away.</li></ol><p>Notice what makes this MECE: market facts, competitive position, money, and feasibility don't overlap, and together they cover everything the board will ask. Your tree doesn't need these exact words - it needs this <i>discipline</i>.</p>"
 },
 {
 title: "Size the market on the back of an envelope",
 minutes: 30,
 skills: ["Market sizing", "Estimation", "Sanity-checking"],
 brief: "<p>The partner stops by your desk: <i>“Before the data request comes back - roughly how many outpatient orthopedic surgeries happen in the Nashville metro each year? I need a number for tomorrow's steering call.”</i> This is a <b>top-down market sizing</b>, and it's also the single most common case-interview exercise. The skill isn't precision - it's a transparent chain of assumptions someone can challenge line by line.</p>",
 data: "<p>Use round planning figures (close enough for this exercise):</p><ul><li>Nashville metro population: <b>≈ 2.1 million</b></li><li>National benchmark: roughly <b>10-12 orthopedic surgeries per 1,000 people per year</b> across all settings</li><li>Industry estimate: about <b>60%</b> of orthopedic procedures can now safely be done outpatient</li></ul>",
 todo: "<ol><li>Chain the assumptions: population × procedure rate × outpatient share.</li><li>State a single number <i>and</i> a plausible range.</li><li>Sanity-check it a second way: if the metro has ~25 orthopedic operating rooms across all facilities, does your number imply a believable cases-per-room-per-day?</li></ol>",
 model: "<p><b>The math:</b> 2.1M people × 11 per 1,000 ≈ <b>23,000 orthopedic surgeries/year</b> in the metro. At a 60% outpatient-eligible share, that's <b>≈ 14,000 outpatient-eligible cases/year</b>, with a defensible range of 11,000-17,000 depending on the rate you assumed.</p><p><b>The sanity check:</b> 14,000 cases ÷ 25 ORs ÷ 250 operating days ≈ 2.2 cases per room per day - believable for a mixed market (a dedicated ASC room runs 4-6 short cases a day; hospital rooms run fewer, longer ones). The number holds.</p><p><b>What the partner actually cares about:</b> you said the assumptions out loud, gave a range instead of false precision, and checked it from a second direction. That habit is 80% of what interviewers grade in a sizing question.</p>"
 },
 {
 title: "Find the story in the client's data",
 minutes: 35,
 skills: ["Data analysis", "Unit economics", "Insight generation"],
 brief: "<p>The client's finance team sends the case-level data you requested, plus a bombshell buried in a footnote: <b>the state's largest commercial insurer will stop paying hospital rates for most of these procedures within two years</b>, steering members to ASCs instead. The partner wants to know: <i>what does this table actually tell us?</i></p>",
 data: "<div class=\"data-block\"><table class=\"d\"><caption>Riverbend outpatient surgical volume & unit economics (most recent year)</caption><thead><tr><th>Procedure group</th><th class=\"num\">Annual cases</th><th class=\"num\">Paid in hospital (HOPD)</th><th class=\"num\">Paid in ASC</th><th class=\"num\">ASC cost/case</th></tr></thead><tbody><tr><td>Total joint replacement</td><td class=\"num\">1,200</td><td class=\"num\">$21,000</td><td class=\"num\">$14,500</td><td class=\"num\">$9,800</td></tr><tr><td>Spine (single-level)</td><td class=\"num\">500</td><td class=\"num\">$18,000</td><td class=\"num\">$12,000</td><td class=\"num\">$8,900</td></tr><tr><td>Sports medicine (ACL, scopes)</td><td class=\"num\">2,100</td><td class=\"num\">$9,500</td><td class=\"num\">$6,800</td><td class=\"num\">$4,300</td></tr><tr><td>Hand & other</td><td class=\"num\">1,600</td><td class=\"num\">$6,200</td><td class=\"num\">$4,600</td><td class=\"num\">$3,100</td></tr></tbody></table></div><p>Assume ~45% of these cases are commercially insured, and that the payer policy will effectively move <b>40% of commercial cases out of hospital settings</b> whether or not Riverbend acts.</p>",
 todo: "<ol><li>Compute the per-case <b>margin an ASC would earn</b> for each procedure group (ASC payment − ASC cost).</li><li>Estimate the annual revenue that the payer policy puts at risk if Riverbend does nothing (cases shifting × hospital payment).</li><li>Write the “so what” in two sentences: what is the strategic insight, stated the way you'd say it to the CEO?</li></ol>",
 hint: "The trap is comparing ASC margin to hospital margin and concluding the ASC looks worse. The real comparison is ASC margin vs. <b>zero</b> - because the shifting cases won't stay in the hospital either way.",
 model: "<p><b>1 - ASC margin per case:</b> joints <b>$4,700</b>, spine <b>$3,100</b>, sports med <b>$2,500</b>, hand <b>$1,500</b>. Weighted across volumes, roughly $2,600 per case.</p><p><b>2 - Revenue at risk:</b> ≈ 5,400 total cases × 45% commercial × 40% shifting ≈ <b>970 cases/year</b> leaving hospital settings. Valued at hospital rates (weighted avg ≈ $11,400), that's <b>≈ $11M/year of revenue at risk</b> - and if a competitor's ASC captures it, Riverbend keeps none of it and may lose the surgeons' loyalty too.</p><p><b>3 - The “so what”:</b> <i>“This isn't a build-vs-don't-build decision - the cases are leaving the hospital either way; the payer just decided that for us. The only real question is whether the shifted cases land in our ASC at ~$2,600 of margin each, or in a competitor's at zero.”</i></p><p>That reframing - from <i>should we?</i> to <i>who captures the inevitable shift?</i> - is what an insight looks like in consulting. The numbers exist to earn that sentence.</p>"
 },
 {
 title: "Deliver the recommendation, answer-first",
 minutes: 30,
 skills: ["Pyramid principle", "Executive communication", "Slide writing"],
 brief: "<p>Time to write the summary slide the partner will present to the board. Consulting communication is <b>answer-first</b> (the “pyramid principle”): lead with the recommendation, support it with three reasons, then acknowledge risks with mitigations. Executives read the title and decide whether to trust the rest - so every title must be a full sentence that carries the message on its own.</p>",
 todo: "<ol><li>Write the slide <b>title as the recommendation itself</b> - a complete sentence, not a topic label like “ASC Analysis.”</li><li>Write <b>three supporting points</b>, each one line, each backed by a number from Tasks 2-3.</li><li>Add a <b>risks & mitigations</b> line and a <b>next steps</b> line.</li><li>Read it aloud. Could a board member act on this slide if the meeting ended after 60 seconds? That's the bar.</li></ol>",
 model: "<p><b>Title:</b> “Riverbend should break ground on a physician-partnered ASC within 12 months - the case shift is happening with or without us.”</p><p><b>Supporting points:</b></p><ul><li>Payer policy will move ~970 of our commercial cases (≈ $11M revenue) out of hospital settings within two years - inaction forfeits them to competitors.</li><li>The metro's ~14,000 outpatient-eligible orthopedic cases are growing, and our employed surgeons currently perform ~5,400 of them - enough to anchor a 4-OR center on day one.</li><li>At ~$2,600 average margin per case, captured-plus-retained volume supports break-even in year 3 under conservative assumptions.</li></ul><p><b>Risks & mitigations:</b> surgeon defection (mitigate with joint-venture equity); construction and licensure timeline (begin certificate-of-need filing now).</p><p><b>Next steps:</b> board approval to fund site selection and JV term-sheet negotiations this quarter.</p><p><b>Why this works:</b> the title takes a position; every bullet has a number; risk is acknowledged rather than hidden. Compare against your version - the most common gap is a title that describes the topic instead of stating the answer.</p>"
 }
 ]
 },
 next: {

 "<b>MHS 2140: Health Care in the U.S.</b> - the system-knowledge foundation every case interview assumes",
 "<b>Economics electives</b> (health economics, econometrics) - the analytical signal firms screen for",

 "Summer internships: <b>McKinsey BA</b>, <b>Bain ACI</b>, <b>BCG Summer Associate</b> - applications open ~June before junior year",
 "Healthcare boutiques with strong undergrad pipelines: <b>Chartis</b>, <b>Clearview</b>, <b>Health Advances</b>, <b>Putnam</b>, <b>ECG</b>, <b>Huron</b>",
 "Sophomore/first-gen early programs: Bain Building Entrepreneurial Leaders, McKinsey Discover, BCG Early Insight",
 "<b>Advisory Board Research Analyst</b> - a writing-heavy alternative entry into healthcare strategy"
 ],
 now: [
 "Try a free online consulting simulation (BCG or Accenture on Forage)",

<script>

window.EXPLORER_TRACKS = window.EXPLORER_TRACKS || [];
window.EXPLORER_TRACKS.push({
 id: "finance-investing",
 name: "Finance & Investing",
 short: "Every hospital merger, biotech IPO, and clinic roll-up has analysts behind it building the models. Healthcare runs on capital - someone has to price it.",
 color: "#5e7d3f",
 wash: "#eaf0e2",
 glyph: "ledger",
 entryTitle: "Entry role: Analyst",
 tagline: "Investment banks advise healthcare companies on mergers and raising money; private equity and venture firms buy or back them. Analysts in both build the financial models, run the valuations, and write the memos that decide where billions flow - and healthcare is one of the largest, busiest sectors in all of finance.",
 stats: [
 { k: "Entry job titles", v: "IB Analyst, PE/VC Analyst" },
 { k: "Recruiting starts", v: "Sophomore spring for junior summer" },
 { k: "Signature deliverable", v: "The model and the memo" },
 { k: "Nashville advantage", v: "A genuine healthcare-PE hub" }
 ],
 field: {
 what: [
 "Healthcare never stops transacting: hospital systems merge, private equity firms buy physician practices and roll them into platforms, venture funds back digital-health startups, and drug companies raise billions for pipelines. Every one of those deals needs people to answer two questions with actual rigor: <b>what is this business worth, and what could go wrong?</b>",
 "On the <b>investment banking</b> side, you advise companies doing deals - building valuation models, drafting pitch books, and managing the blizzard of analysis a live transaction generates. On the <b>investing</b> side (private equity, growth equity, venture), you're the buyer: screening companies, doing due diligence, and writing the investment memo that convinces a committee to commit capital. Both start with the same craft: financial statements, Excel, and disciplined skepticism.",
 "Healthcare finance rewards domain knowledge unusually fast. A generalist can model cash flows; you have to also know that a payer contract renewal, a Medicare rate change, or a single retiring physician can move a valuation by millions. That intersection - finance craft plus healthcare fluency - is exactly what firms struggle to hire, and it's very buildable at Vanderbilt. Nashville is arguably the healthcare-services capital of the country: HCA was founded here, and a dense cluster of healthcare PE firms and investment banks operates within two miles of campus."
 ],
 misconception: "That you need to be a math genius. Deal math is arithmetic - multiplication and division on a good day. What the job actually demands is stamina, obsessive attention to detail (a wrong number in a live deal is a career event), and genuine curiosity about how businesses make money. The bar is carefulness, not calculus.",
 titles: [
 { title: "Investment Banking Analyst - Healthcare", desc: "The classic entry role at Goldman, J.P. Morgan, Leerink, Cain Brothers, TripleTree. Two years of models, pitch books, and live deals." },
 { title: "Private Equity Analyst / Associate", desc: "Buy-side at firms like Shore Capital or Heritage Group: screen practices, run diligence, support portfolio companies post-close." },
 { title: "Venture Capital Analyst - Health", desc: "Source and evaluate digital-health and health-services startups at funds like Frist Cressey or Flare Capital. More qualitative, network-driven." },
 { title: "Corporate Finance / FP&A Analyst (health system)", desc: "Inside HCA, Lifepoint, or VUMC: budgeting, capital planning, M&A support. Saner hours, same toolkit." }
 ],
 day: [
 { time: "8:45a", what: "Scan overnight: a competitor platform just bought a 6-clinic group - pull the multiple if it leaked." },
 { time: "9:30a", what: "Update the dermatology model with the seller's new volume data; EBITDA bridge moves by $400K." },
 { time: "11:00a", what: "Diligence call with the target's billing manager about that payer contract renewal." },
 { time: "1:00p", what: "Build the payer-mix sensitivity table the VP asked for - what happens if the big contract reprices down 5%?" },
 { time: "3:00p", what: "Draft two pages of the investment memo: market section and risk section." },
 { time: "5:00p", what: "Turn partner comments on the memo; triple-check every number against the model." },
 { time: "7:00p", what: "On a live deal this could go late; in a quiet week you're at dinner. Deal flow sets the rhythm." }
 ],
 employers: {
 nashville: ["Heritage Group", "Frist Cressey Ventures", "Council Capital", "Petra Capital Partners", "Cressey & Company", "Brentwood Capital Advisors", "VMG Health", "Martin Ventures", "Jumpstart Health Investors", "HCA (corporate finance)"],
 national: ["Goldman Sachs Healthcare IB", "J.P. Morgan Healthcare IB", "Morgan Stanley", "Leerink Partners", "Cain Brothers / KeyBanc", "TripleTree", "Houlihan Lokey", "Jefferies", "Piper Sandler", "William Blair", "Ziegler", "Shore Capital Partners", "Welsh Carson", "General Atlantic", "Frazier Healthcare", "Bain Capital (healthcare)", "Kaufman Hall"]
 },
 thrive: [
 "You get satisfaction from a spreadsheet where every number <b>ties</b>",
 "You want a concrete verdict at the end of your work: a price, a yes, a no",
 "Pressure and late nights on a live deal sound exciting at least some of the time",
 "You read business news for fun, or could learn to",
 "You want optionality - two years of deal experience opens PE, VC, corporate strategy, and business school doors"
 ]
 },
 project: {
 title: "Project Harmony: should we buy this dermatology group?",
 role: "Analyst, Cumberland Ridge Capital (a fictional Nashville healthcare private equity firm)",
 setting: "Live deal, 3 weeks to an indicative offer",
 duration: "≈ 2 hours",
 premise: [
 "A banker just sent your firm a teaser: <b>Delta Dermatology Partners</b>, a 12-clinic dermatology group across Tennessee and Alabama, is for sale. Your fund invests in exactly this kind of business - physician practices that can anchor a regional “platform” and grow by acquiring smaller clinics. The partners like the sector. Your job is to figure out whether they should like <i>this company</i>, and at what price.",
 "You'll do what a first-year PE analyst actually does on a new deal: normalize the financials, triangulate a valuation, hunt for red flags, and write the memo. Numbers are simplified but the logic is the real thing."
 ],
 fictionNote: "Delta Dermatology and Cumberland Ridge Capital are fictional. The valuation benchmarks are real, though: physician practices have been among the most active categories in healthcare private equity, with primary care historically trading around 4-7× EBITDA and specialty groups around 6-12× - exactly the arbitrage that drives roll-up strategies at real Nashville-area firms.",
 tasks: [
 {
 title: "Find the real earnings: build adjusted EBITDA",
 minutes: 30,
 skills: ["Financial statements", "EBITDA & add-backs", "Excel thinking"],
 brief: "<p>Buyers don't value revenue or net income - they value <b>EBITDA</b> (earnings before interest, taxes, depreciation, and amortization), a proxy for the cash the business throws off. And they value <b>adjusted</b> EBITDA: earnings normalized for one-time costs and owner quirks that won't exist after the sale. Finding those adjustments - honestly - is the analyst's first job on any deal.</p>",
 data: "<div class=\"data-block\"><table class=\"d\"><caption>Delta Dermatology Partners - summary income statement (last twelve months, $000s)</caption><thead><tr><th>Line item</th><th class=\"num\">Amount</th></tr></thead><tbody><tr><td>Revenue</td><td class=\"num\">48,000</td></tr><tr><td>Physician compensation & benefits</td><td class=\"num\">(19,200)</td></tr><tr><td>Clinical staff wages</td><td class=\"num\">(8,600)</td></tr><tr><td>Medical supplies & drugs</td><td class=\"num\">(4,300)</td></tr><tr><td>Rent & facilities (12 clinics)</td><td class=\"num\">(2,900)</td></tr><tr><td>Billing & administration</td><td class=\"num\">(5,000)</td></tr><tr><td>One-time EMR migration project</td><td class=\"num\">(700)</td></tr><tr><td>Depreciation & amortization</td><td class=\"num\">(1,100)</td></tr><tr><td>Interest expense</td><td class=\"num\">(600)</td></tr><tr><td><b>Pre-tax income</b></td><td class=\"num\"><b>5,600</b></td></tr></tbody></table></div><p>Diligence note from the banker: the founding physician pays herself <b>$800K above</b> the market rate a replacement dermatologist would earn.</p>",
 todo: "<ol><li>Compute <b>reported EBITDA</b>: start from pre-tax income and add back interest, depreciation & amortization.</li><li>Compute <b>adjusted EBITDA</b>: add back genuinely one-time or non-recurring items. Decide - does the EMR project qualify? Does the excess owner compensation?</li><li>Compute the adjusted EBITDA <b>margin</b> (÷ revenue). Specialty practices typically run 15-25% - where does Delta sit?</li></ol>",
 hint: "Add-backs must pass the question: “Will the new owner truly not pay this cost going forward?” A one-time system migration passes. Above-market owner pay passes <i>if</i> a replacement really would cost $800K less. “Marketing we probably won't do again” does not pass - sellers try that one constantly.",
 model: "<p><b>Reported EBITDA:</b> 5,600 + 600 interest + 1,100 D&A = <b>$7.3M</b>.</p><p><b>Adjusted EBITDA:</b> 7,300 + 700 (one-time EMR migration) + 800 (excess owner comp, assuming a market-rate replacement) = <b>$8.8M</b>.</p><p><b>Margin:</b> 8.8 / 48.0 ≈ <b>18.3%</b> - comfortably inside the healthy 15-25% band for specialty groups; neither a red flag nor best-in-class.</p><p><b>The habit that matters:</b> you wrote each adjustment down with its justification. In a real memo, every add-back gets a sentence of defense, because the investment committee will attack exactly those numbers - each $1 of dubious add-back inflates the price by $8-9 at deal multiples. That's why sell-side EBITDA is always “adjusted” upward and buyers exist to argue it back down.</p>"
 },
 {
 title: "Put a price on it: valuation by comparables",
 minutes: 30,
 skills: ["Valuation multiples", "Comparable analysis", "Sensitivity thinking"],
 brief: "<p>The workhorse valuation for private healthcare deals is <b>comparable transactions</b>: what have buyers recently paid for similar businesses, expressed as a multiple of EBITDA? Multiples aren't magic numbers - they move with growth, scale, payer mix, and how badly buyers want the sector. Your job is to pick a defensible range, not a false-precision point.</p>",
 data: "<div class=\"data-block\"><table class=\"d\"><caption>Benchmark: recent physician-practice transaction multiples (EV / adjusted EBITDA)</caption><thead><tr><th>Segment</th><th class=\"num\">Typical range</th><th>What pushes you higher in the range</th></tr></thead><tbody><tr><td>Primary care practices</td><td class=\"num\">4-7×</td><td>Scale, value-based contracts</td></tr><tr><td>Specialty groups (derm, ortho, GI…)</td><td class=\"num\">6-12×</td><td>Platform size, growth, ancillary revenue</td></tr><tr><td>Small “add-on” clinics (1-3 docs)</td><td class=\"num\">3-6×</td><td>Bought by platforms, not funds</td></tr></tbody></table></div><p>Context: Delta is a 12-clinic <b>platform-scale</b> specialty group growing revenue ~8%/year, with the diligence questions from Task 3 still open.</p>",
 todo: "<ol><li>Choose low / base / high multiples for Delta from the specialty range, and justify each in a phrase.</li><li>Multiply by your adjusted EBITDA from Task 1 to get an <b>enterprise value (EV)</b> range.</li><li>Explain in one sentence why your fund might happily pay 9× for Delta while paying only 5× for a two-doctor clinic down the road - the logic that powers every roll-up strategy.</li></ol>",
 model: "<p><b>A defensible range:</b> low 7× (platform scale, but payer-concentration risk unresolved), base 9× (solid mid-range specialty platform with growth), high 11× (if diligence comes back clean and a competitive auction develops).</p><p><b>On $8.8M adjusted EBITDA:</b> EV ≈ <b>$62M / $79M / $97M</b>.</p><p><b>The roll-up logic:</b> a platform bought at 9× can acquire small add-on clinics at 4-5× and, once integrated, have them valued inside the platform at the platform's multiple - buying dollars of EBITDA cheap and marking them up by consolidation. That “multiple arbitrage,” plus real operating synergies (shared billing, purchasing, scheduling), is the engine of physician-practice private equity - and understanding it is table stakes for interviews at any healthcare PE firm.</p>"
 },
 {
 title: "Hunt for what kills the deal: diligence red flags",
 minutes: 30,
 skills: ["Due diligence", "Risk assessment", "Skeptical reading"],
 brief: "<p>Valuation tells you what the business is worth <i>if the story is true</i>. Diligence asks whether it's true. The associate hands you three exhibits from the data room and one instruction: <i>“Find what's going to hurt us.”</i></p>",
 data: "<div class=\"data-block\"><table class=\"d\"><caption>Exhibit A - Revenue by payer</caption><thead><tr><th>Payer</th><th class=\"num\">% of revenue</th><th>Note</th></tr></thead><tbody><tr><td>BlueShield Commercial</td><td class=\"num\">45%</td><td>Contract renews in 14 months</td></tr><tr><td>Medicare</td><td class=\"num\">28%</td><td>Fee schedule set by CMS</td></tr><tr><td>Other commercial</td><td class=\"num\">17%</td><td>Six smaller contracts</td></tr><tr><td>Self-pay / cosmetic</td><td class=\"num\">10%</td><td>Elective, cash-pay</td></tr></tbody></table><table class=\"d\"><caption>Exhibit B - Revenue by physician (top of 18 total)</caption><thead><tr><th>Physician</th><th class=\"num\">% of revenue</th><th class=\"num\">Age</th></tr></thead><tbody><tr><td>Dr. A (founder)</td><td class=\"num\">24%</td><td class=\"num\">63</td></tr><tr><td>Dr. B</td><td class=\"num\">16%</td><td class=\"num\">58</td></tr><tr><td>Dr. C</td><td class=\"num\">12%</td><td class=\"num\">41</td></tr><tr><td>Remaining 15 physicians</td><td class=\"num\">48%</td><td class=\"num\"> - </td></tr></tbody></table><table class=\"d\"><caption>Exhibit C - Same-clinic revenue growth</caption><thead><tr><th>Source of growth</th><th class=\"num\">Contribution to 8% growth</th></tr></thead><tbody><tr><td>Existing 11 clinics (same-store)</td><td class=\"num\">+1.5%</td><td></td></tr><tr><td>New Huntsville clinic (opened last year)</td><td class=\"num\">+6.5%</td><td></td></tr></tbody></table></div>",
 todo: "<ol><li>Identify the <b>three biggest risks</b> hiding in these exhibits. For each: what it is, why it threatens the valuation, and what you'd request or negotiate to address it.</li><li>Decide: are these deal-killers, price-reducers, or structure-shapers?</li></ol>",
 model: "<p><b>Risk 1 - Payer concentration.</b> 45% of revenue rides on one commercial contract that reprices in 14 months, right after closing. A 10% rate cut on that contract cuts revenue ~4.5% and, since costs barely move, could erase ~25% of EBITDA. <i>Ask for:</i> the contract, its rate history, and the payer's ASC/office steering policies; consider an earnout tied to the renewal.</p><p><b>Risk 2 - Key-person concentration.</b> Two physicians in their late 50s/60s produce 40% of revenue. If Dr. A retires post-close, a quarter of collections walks out the door. <i>Ask for:</i> multi-year employment agreements with meaningful rollover equity, non-competes, and a recruiting plan - this is usually a structure-shaper, not a killer.</p><p><b>Risk 3 - Growth quality.</b> “8% growth” is really 1.5% same-store plus one new clinic. The base business is nearly flat, so paying a growth multiple for it is dangerous. <i>Ask for:</i> clinic-level P&Ls, the Huntsville ramp curve, and the pipeline of future sites - then consider valuing base and new-clinic growth separately.</p><p><b>Verdict:</b> none are automatic deal-killers; together they justify anchoring at the low end of your range (7-8×) and structuring protections. Notice the pattern - every exhibit looked fine as an average and alarming in its detail. Averages are where risk hides; diligence is the art of disaggregating.</p>"
 },
 {
 title: "Write the one-page investment memo",
 minutes: 30,
 skills: ["Investment writing", "Synthesis", "Committee communication"],
 brief: "<p>Monday's pipeline meeting decides whether Cumberland Ridge submits an indicative offer. The partners will read one page. Investment memos have a rigid, learnable anatomy - and writing one forces the discipline that separates analysis from opinion: every claim needs a number, every risk needs a response.</p>",
 todo: "<ol><li>Write the memo with these six sections, 1-3 sentences each: <b>Thesis</b> (why this deal, in one sentence) · <b>Business</b> (what it is, size, margin) · <b>Market</b> (why dermatology, why the Southeast) · <b>Valuation</b> (your range and where you'd anchor) · <b>Key risks & mitigants</b> (your top three from Task 3) · <b>Recommendation</b> (proceed / pass, with conditions).</li><li>Rule: every sentence must contain either a number or a decision. Delete anything that's neither.</li></ol>",
 model: "<p><b>Thesis:</b> Platform-scale dermatology group in a consolidating specialty - a chance to buy $8.8M of adjusted EBITDA at a mid-range multiple and grow through add-on acquisitions at half the entry multiple.</p><p><b>Business:</b> 12 clinics, TN/AL; $48M revenue, $8.8M adjusted EBITDA (18.3% margin); 18 physicians.</p><p><b>Market:</b> Dermatology demand grows with demographics and stays largely outpatient; the Southeast remains fragmented, with 30+ independent practices in Delta's footprint as add-on targets.</p><p><b>Valuation:</b> Comparable specialty platforms trade 6-12×; we see $62-97M EV and would anchor an indicative bid near <b>8× / $70M</b> pending diligence.</p><p><b>Key risks & mitigants:</b> (1) 45% payer concentration with a 14-month renewal - earnout tied to renewal terms; (2) two senior physicians = 40% of revenue - rollover equity and employment agreements; (3) same-store growth of only 1.5% - underwrite base business flat, value new-clinic pipeline separately.</p><p><b>Recommendation:</b> Proceed to indicative offer at 8× with the three protections above; walk if the BlueShield contract shows repricing risk beyond 5%.</p><p><b>Compare your version:</b> the most common miss is a thesis that describes the company instead of stating why <i>this buyer</i> wins by owning it. “Nice business” is not a thesis; “cheap EBITDA plus multiple arbitrage” is.</p>"
 }
 ]

 "Career paths run two ways. The <b>hospital route</b>: administrative intern or fellow → department operations manager → service-line director → hospital executive. The <b>corporate route</b>, huge in Nashville: analyst and coordinator roles at the headquarters of companies that run hundreds of facilities (HCA, Lifepoint, CHS, Surgery Partners), working on staffing models, throughput, supply chain, and revenue cycle across the whole portfolio.",

 project: {
 title: "Fix the Friday-night emergency department",
 role: "Administrative intern, Midstate Regional Medical Center (a fictional 380-bed Nashville-area hospital)",

 "The VP of Operations hands you the project: <i>“Figure out what's actually broken, and bring me something we can pilot in 90 days.”</i> You'll work it the way hospital operators do: walk the process, read the data, find the root cause, then design a measurable fix."

 tasks: [
 {
 title: "Walk the process: map the patient's journey",
 minutes: 25,
 skills: ["Process mapping", "Gemba observation", "Systems thinking"],
 brief: "<p>Lean operations has a rule: <i>go and see</i> (the “gemba walk”). Before touching data, you spend Friday evening in the ED following the process a patient experiences. Your notes: patients check in at a desk, wait, get triaged by a nurse (vitals, acuity score), wait again, get a bed <i>if one's open</i>, wait for the physician, then labs/imaging, then the decision - discharge home or admit to the hospital. Admitted patients wait in ED beds until an inpatient bed opens (“boarding”).</p>",
 todo: "<ol><li>Draw the journey as a simple flow: every step in a box, every <b>wait</b> as a triangle between boxes. Aim for 8-12 steps from arrival to departure.</li><li>Mark the three places waiting seemed worst in your observation.</li><li>For each wait, write what the patient is waiting <i>for</i> - a person? a room? a decision? a test result? That distinction drives everything later.</li></ol>",
 model: "<p>A clean map looks like:</p><ol><li><b>Arrival → check-in</b> (wait: registration clerk)</li><li><b>Check-in → triage</b> (wait: triage nurse - one on duty)</li><li><b>Triage → ED bed</b> (wait: <b>an open bed</b>, often the longest queue)</li><li><b>Bed → provider exam</b> (wait: physician/APP availability)</li><li><b>Orders → labs/imaging → results</b> (wait: test turnaround)</li><li><b>Results → disposition decision</b> (wait: physician re-review)</li><li><b>If discharged:</b> paperwork → departure</li><li><b>If admitted:</b> wait for inpatient bed = <b>boarding</b> (the patient occupies an ED bed for hours - which is why step 3's queue exists)</li></ol><p><b>The key structural insight:</b> the waits aren't independent. Boarding (step 8) consumes the beds that step 3 is queuing for. An ED that looks understaffed is often actually <i>blocked from downstream</i> - the bottleneck lives outside the ED, in how fast the inpatient units discharge. Hold that thought for Task 3.</p>"
 },
 {
 title: "Read the numbers like an operator",
 minutes: 30,
 skills: ["Throughput metrics", "Excel analysis", "Pattern finding"],
 brief: "<p>Monday morning, the data analyst sends you three months of throughput data cut by shift. Hospital operators live on three metrics: <b>door-to-provider time</b> (arrival until a clinician sees you), <b>length of stay (LOS)</b> for discharged patients, and <b>LWBS rate</b>. Averages hide problems, so the data comes segmented.</p>",
 data: "<div class=\"data-block\"><table class=\"d\"><caption>Midstate ED throughput by shift (3-month averages)</caption><thead><tr><th>Shift block</th><th class=\"num\">Arrivals/day</th><th class=\"num\">Door-to-provider (median min)</th><th class=\"num\">LOS, discharged (hrs)</th><th class=\"num\">LWBS rate</th></tr></thead><tbody><tr><td>Weekday days (7a-3p)</td><td class=\"num\">58</td><td class=\"num\">22</td><td class=\"num\">3.1</td><td class=\"num\">0.9%</td></tr><tr><td>Weekday evenings (3p-11p)</td><td class=\"num\">74</td><td class=\"num\">41</td><td class=\"num\">4.0</td><td class=\"num\">2.8%</td></tr><tr><td>Fri-Sat evenings (3p-11p)</td><td class=\"num\">92</td><td class=\"num\">68</td><td class=\"num\">5.2</td><td class=\"num\">6.5%</td></tr><tr><td>Nights (11p-7a)</td><td class=\"num\">31</td><td class=\"num\">18</td><td class=\"num\">2.7</td><td class=\"num\">0.7%</td></tr></tbody></table></div><p>Finance adds: the average ED visit generates ≈ <b>$650</b> in net revenue, and ~18% of ED patients are admitted (an admission generates far more).</p>",
 todo: "<ol><li>Where is the problem concentrated? Say it precisely - which shifts, how much worse than baseline.</li><li>Estimate <b>patients lost to LWBS per year</b> on Fri-Sat evenings (arrivals × rate × 2 days × 52 weeks) and the direct revenue those walkouts represent.</li><li>Name one reason the true cost is larger than your revenue number.</li></ol>",
 model: "<p><b>1 - The problem is Friday-Saturday evenings, full stop.</b> Door-to-provider is 3× the weekday-day baseline (68 vs 22 min) and LWBS is 7× (6.5% vs 0.9%). Nights are fine; this is a <i>peak-load</i> problem, not a general one.</p><p><b>2 - The walkout math:</b> 92 arrivals × 6.5% ≈ 6 LWBS per evening × 2 evenings × 52 weeks ≈ <b>620 patients/year</b>. At $650 average, that's <b>≈ $400K/year in direct revenue</b> walking out the door - before counting the ~18% who would have been admitted, worth several times more.</p><p><b>3 - The bigger cost:</b> LWBS patients are untreated emergency patients - some come back sicker (safety and liability), some never come back (lost lifetime relationship), and public wait times shape the hospital's reputation and referral flows. Operators quantify what they can and name what they can't - your slide should do both.</p>"
 },
 {
 title: "Find the root cause, not the loudest symptom",
 minutes: 30,
 skills: ["Root-cause analysis", "5 Whys", "Constraint thinking"],
 brief: "<p>The obvious fix - “hire more ER doctors” - is expensive and, if the bottleneck is beds rather than clinicians, useless. Lean gives you the <b>5 Whys</b>: keep asking why until you hit a cause you can act on. The analyst pulls two more data points for Friday-Saturday evenings: <b>ED boarding</b> averages 9 patients (vs 2 on weekday days) - a quarter of the ED's 36 beds are occupied by patients already admitted. And on the inpatient side, <b>most discharges complete between 4pm and 7pm</b>, even though physicians write discharge orders in the morning.</p>",
 todo: "<ol><li>Run the 5 Whys starting from “patients wait 68 minutes to see a provider on Friday nights.” Use the boarding and discharge-timing facts.</li><li>Identify the <b>constraint</b>: which single resource, freed up, would relieve the most pressure?</li><li>List one contributing cause the 5 Whys chain does <i>not</i> explain (there's usually more than one root).</li></ol>",
 hint: "Follow the beds. Why are ED beds full? Why are admitted patients still in them? Why aren't inpatient beds ready? Why do discharges finish at 5pm when the orders were written at 10am?",
 model: "<p><b>The chain:</b> Patients wait to be seen → because ED beds are full → because ~9 beds hold <i>boarding</i> patients already admitted → because inpatient beds aren't ready until evening → because discharges complete at 4-7pm → because the steps after the morning discharge order (final labs, pharmacy meds-to-go, transport, room cleaning) are nobody's coordinated job - each queues behind other work. <b>Root cause: the discharge process upstream, not the ED itself.</b></p><p><b>The constraint:</b> inpatient bed availability between 3pm and 9pm. Free beds earlier in the day and boarding drains, ED beds open, door-to-provider falls - without hiring a single additional ED clinician.</p><p><b>What the chain doesn't explain:</b> even with zero boarding, Fri-Sat arrivals (92 vs 58) exceed weekday staffing plans - there's a genuine peak-staffing gap in triage and fast-track for low-acuity patients. Real operational problems almost always have two or three interacting roots; a fix that addresses only one underdelivers. That's why Task 4 pairs an upstream fix with an in-ED fix.</p>"
 },
 {
 title: "Design the 90-day pilot the VP can say yes to",
 minutes: 35,
 skills: ["Intervention design", "KPIs & targets", "Change management"],
 brief: "<p>Executives don't approve “ideas” - they approve <b>pilots</b>: a specific change, on a specific unit, for a specific period, with baseline metrics, targets, and an owner. Your VP wants exactly that, one page. She also warns you: <i>“The hospitalists and nurses have seen ten flavor-of-the-month initiatives. Tell me why this one sticks.”</i></p>",
 todo: "<ol><li>Choose <b>two interventions</b> - one attacking the upstream root cause (discharge timing), one attacking the peak-load gap (Fri-Sat evenings). Describe each in two sentences.</li><li>Build the measurement table: 3-4 KPIs, each with current baseline (from Task 2) and a 90-day target.</li><li>Answer the stickiness question: name the two stakeholder groups whose behavior must change, and one concrete thing you'd do for each so the change survives month four.</li></ol>",
 model: "<p><b>Intervention 1 - “Discharge by noon” on two pilot inpatient units.</b> Discharge steps start the afternoon <i>before</i> (pharmacy, transport, education queued at order time); a 9am huddle names every discharge-ready patient; environmental services pre-positions room cleaning. Goal: majority of discharges complete before 2pm, opening beds before the ED's evening peak.</p><p><b>Intervention 2 - Fri-Sat evening fast-track + provider-in-triage.</b> From 3-11pm Friday and Saturday, one APP staffs a 4-bed fast-track for low-acuity patients, and triage starts orders immediately so tests run during the wait instead of after it.</p><p><b>The scoreboard:</b></p><div class=\"data-block\"><table class=\"d\"><thead><tr><th>KPI</th><th class=\"num\">Baseline</th><th class=\"num\">90-day target</th></tr></thead><tbody><tr><td>Door-to-provider, Fri-Sat eve (median)</td><td class=\"num\">68 min</td><td class=\"num\">≤ 40 min</td></tr><tr><td>LWBS rate, Fri-Sat eve</td><td class=\"num\">6.5%</td><td class=\"num\">≤ 3.0%</td></tr><tr><td>ED boarding at 5pm (avg patients)</td><td class=\"num\">9</td><td class=\"num\">≤ 5</td></tr><tr><td>Discharges complete by 2pm (pilot units)</td><td class=\"num\">~25%</td><td class=\"num\">≥ 50%</td></tr></tbody></table></div><p><b>Stickiness:</b> Hospitalists - co-design the huddle with their medical director and report <i>their</i> unit's boarding relief back to them monthly (physicians respond to their own data). Nurses - the discharge coordination work is real added labor, so fund a unit-clerk hour shift rather than stacking it on the charge nurse, and put a bedside nurse on the pilot team from day one. A pilot designed <i>with</i> the people who work the process is the difference between a 90-day blip and a new normal.</p>"
 }
 ]
 },
